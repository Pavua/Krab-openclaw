# Prometheus alert rules для Krab.
# Загружать через rule_files в prometheus.yml.
# Валидация: promtool check rules ops/prometheus/krab_alerts.yml
groups:
  - name: krab_critical
    interval: 60s
    rules:
      - alert: KrabDown
        expr: up{job="krab"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Krab service down"
          description: "Krab metrics endpoint not reachable >2min"

      - alert: ArchiveDbSizeWarning
        expr: krab_archive_db_size_bytes > 500 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "archive.db > 500 MB"
          description: "Memory Layer archive approaching recommended limit"

      - alert: ArchiveDbSizeCritical
        expr: krab_archive_db_size_bytes > 1024 * 1024 * 1024
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "archive.db > 1 GB"
          description: "Memory Layer archive exceeded critical threshold, prune required"

      - alert: MemoryValidatorPendingHigh
        expr: krab_memory_validator_pending > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory validator queue has {{ $value }} pending confirmations"
          description: "Много pending !confirm items — возможно user забывает подтверждать memory injections"

      - alert: ArchiveChunksStalled
        expr: delta(krab_archive_chunks_embedded_total[30m]) == 0 and krab_archive_messages_total > krab_archive_chunks_total * 4
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Archive chunk embedding stalled"
          description: "Новые messages есть, но chunks не создаются 30 мин — embedder может быть застрял"

      - alert: RemindersQueueBacklog
        expr: krab_reminders_pending_total > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} reminders pending"
          description: "Reminders queue backlogged — scheduler может быть остановлен"

      - alert: ChatFilterModeMuteDominant
        expr: sum(rate(krab_chat_filter_modes_total{mode="muted"}[15m])) / sum(rate(krab_chat_filter_modes_total[15m])) > 0.8
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "> 80% chats in muted mode"
          description: "Большинство чатов в muted — возможно user хочет reconsider global silence"

      - alert: CommandInvocationSpike
        expr: rate(krab_command_invocations_total[5m]) > 10
        for: 3m
        labels:
          severity: info
        annotations:
          summary: "Command invocation rate {{ $value }}/sec — unusually high"
          description: "Spike в использовании команд — возможно автоматизация или loop"

      - alert: MemoryValidatorConfirmFailedSpike
        expr: rate(krab_memory_validator_confirm_failed_total[10m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory confirm failures at {{ $value }}/sec"
          description: "User часто использует !reset вместо !confirm — UX friction"

      - alert: LLMRouteLatencyHigh
        expr: histogram_quantile(0.95, rate(krab_llm_route_latency_seconds_bucket[5m])) > 10.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM route p95 latency > 10s"
          description: "Provider {{ $labels.provider }} / {{ $labels.model }} отвечает медленно"

      - alert: VecQueryLatencyHigh
        expr: histogram_quantile(0.95, rate(krab_vec_query_duration_seconds_bucket[10m])) > 0.1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "vec query p95 > 100ms — consider HNSW migration"
          description: "Linear scan latency growing. Current vector count likely > 250k."

      - alert: KrabAutoRestartSpiking
        expr: rate(krab_auto_restart_attempts_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Auto-restart attempts > 0.1/sec за 10 мин"
          description: "Service {{ $labels.service }} нестабилен — нужен manual investigation"

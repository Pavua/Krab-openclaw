# Prometheus config для scraping Krab metrics.
# Save as /path/to/prometheus.yml + start: prometheus --config.file=prometheus.yml
#
# Реализация endpoint: src/core/prometheus_metrics.py
# Документация: docs/PROMETHEUS_MONITORING.md

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'krab-local'

rule_files:
  - "krab_alerts.yml"

scrape_configs:
  - job_name: 'krab'
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['127.0.0.1:8080']
        labels:
          instance: 'krab-main'
          service: 'userbot'

# Krab Prometheus alert rules.
# Load from prometheus.yml via rule_files: ["krab_alerts.yml"]
#
# Три группы: critical, capacity, engagement.
# Документация: docs/PROMETHEUS_MONITORING.md

groups:
  # ── Critical: немедленное внимание ──────────────────────────────────────────
  - name: krab_critical
    interval: 30s
    rules:
      - alert: KrabLLMRouteDown
        expr: krab_llm_route_ok == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Krab LLM route failing for {{ $labels.provider }}/{{ $labels.model }}"
          description: "`krab_llm_route_ok` = 0 for 2 min. Check Gateway + provider OAuth."

      - alert: KrabMemoryValidatorOverload
        expr: krab_memory_validator_pending > 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory validator pending queue > 15 для 10+ мин"
          description: "Возможно injection attack или много legitimate рекуррентных запросов. Проверь `!memory confirm list`."

      - alert: KrabMetricsStale
        expr: (time() - krab_metrics_generated_at) > 120
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Krab /metrics endpoint stale (>2min)"
          description: "Krab возможно down или endpoint не отвечает. Проверь `!health` и процесс userbot."

  # ── Capacity: планирование ёмкости ──────────────────────────────────────────
  - name: krab_capacity
    interval: 5m
    rules:
      - alert: KrabArchiveGrowingFast
        expr: rate(krab_archive_messages_total[1h]) > 10000
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "archive.db растёт > 10k msgs/час"
          description: "Рассмотри корректировку retention policy или архивацию старых сообщений."

      - alert: KrabArchiveDBLarge
        expr: krab_archive_db_size_bytes > 1073741824  # 1 GiB
        labels:
          severity: warning
        annotations:
          summary: "archive.db > 1 GB — рассмотри partitioning/pruning"
          description: "Текущий размер: {{ $value | humanize1024 }}B."

      - alert: KrabAutoRestartSpiking
        expr: rate(krab_auto_restart_attempts_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Auto-restart attempts > 0.1/sec за 10 мин"
          description: "Service {{ $labels.service }} нестабилен — нужен manual investigation. Логи: `!log {{ $labels.service }}`."

  # ── Engagement: бизнес-сигналы ──────────────────────────────────────────────
  - name: krab_engagement
    interval: 5m
    rules:
      - alert: KrabInjectionSpike
        expr: rate(krab_memory_validator_injection_blocked_total[1h]) > 0.01
        labels:
          severity: info
        annotations:
          summary: "Injection attempts > 36 per hour"
          description: "Под atak'ом или нужна tune паттернов validator. См. `src/core/memory_validator.py`."

  # ── Wave 50-E: Wave 47-49 features (fallback chain / catchup / snapshots) ──
  # Метрики ниже опираются на счётчики, которые landing вместе с экспортёрами
  # для соответствующих событий (см. docs/CLAUDE_AUTO_PROMETHEUS.md → Pending).
  # Prometheus трактует отсутствующую серию как "no data" — alert просто не
  # сработает до первого scrape, никаких ложных алармов это не вызовет.
  - name: krab_wave_47_49
    interval: 1m
    rules:
      - alert: FallbackChainExhaustedAlert
        # Wave 48-B: model_fallback_engaged — переключение по цепочке fallback.
        # > 5 событий за 1ч = chain "ползёт" слишком часто, primary unhealthy.
        expr: increase(krab_model_fallback_engaged_total[1h]) > 5
        labels:
          severity: warning
          wave: "48-B"
        annotations:
          summary: "Fallback chain advanced > 5 раз за час"
          description: "Routing нестабилен. См. `!routes` и `route_switches.jsonl`. Вероятная причина: primary провайдер деградировал."

      - alert: CodexQuotaExhaustedAlert
        # Wave 47: codex_disabled_transition — codex-cli ушёл в quota cooldown.
        # Single occurrence — informational, не critical (есть auto-fallback).
        expr: increase(krab_codex_disabled_transition_total[24h]) > 0
        labels:
          severity: info
          wave: "47"
        annotations:
          summary: "Codex CLI исчерпал quota и переключился на cooldown"
          description: "Auto-fallback работает (см. !quota). Информационный сигнал — никаких ручных действий."

      - alert: MultiChatCatchupFailedAlert
        # Wave 49: startup_catchup_chat_failed — per-chat ошибка догонялки.
        # > 3 за час = systemic, не сетевой glitch.
        expr: increase(krab_startup_catchup_chat_failed_total[1h]) > 3
        labels:
          severity: warning
          wave: "49"
        annotations:
          summary: "Multi-chat catchup упал > 3 раз за час"
          description: "Возможна Pyrogram session corruption или Telegram-side rate-limit. Смотри `message_catchup.py` логи."

      - alert: StateSnapshotFailedAlert
        # Wave 49: state_snapshot_failed — снэпшот runtime state провалился.
        # Single occurrence — critical: при следующем рестарте потеряем context.
        expr: increase(krab_state_snapshot_failed_total[24h]) > 0
        labels:
          severity: critical
          wave: "49"
        annotations:
          summary: "State snapshot failed — рестарт может потерять context"
          description: "См. `src/core/state_snapshots.py`. Проверь права на ~/.openclaw/krab_runtime_state/ и свободное место."

      - alert: ProviderTimeoutHighAlert
        # provider_timeout — тайминг-ошибка от облачного провайдера.
        # > 10/min = провайдер деградировал, нужен manual switch.
        expr: rate(krab_provider_timeout_total[5m]) > (10 / 60)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "provider_timeout > 10/min для {{ $labels.provider }}"
          description: "Облачный провайдер тормозит. Рассмотри manual switch на резервный routing."

      - alert: RouteSwitchHighFrequencyAlert
        # Wave 48-B: routing flapping — > 20 переключений/ч = нестабильность.
        expr: increase(krab_model_fallback_engaged_total[1h]) > 20
        labels:
          severity: warning
          wave: "48-B"
        annotations:
          summary: "Route switches > 20/h — нестабильность routing"
          description: "Анализируй `!routes` и `route_switches.jsonl`: возможен flapping из-за двух одинаково больных провайдеров."

  # ── Wave 55-C: Timing histogram alerts ──────────────────────────────────────
  - name: krab_wave_55c_histograms
    interval: 1m
    rules:
      - alert: LongChainAdvanceAlert
        # Wave 55-C: среднее время chain advance > 30s за 5 мин = замедленное переключение.
        # Сигнализирует о длинных таймаутах провайдера перед advance (ожидание 30-90s ответа).
        expr: >
          rate(krab_chain_advance_duration_seconds_sum[5m])
          /
          rate(krab_chain_advance_duration_seconds_count[5m]) > 30
        for: 5m
        labels:
          severity: warning
          wave: "55-C"
        annotations:
          summary: "Chain advance avg > 30s за 5 мин — медленное переключение цепочки"
          description: "Провайдеры отвечают слишком долго перед таймаутом. Проверь `!routes` и логи provider_timeout. Возможна деградация сети или провайдера."

      - alert: ResponseSizeAnomalyAlert
        # Wave 55-C: p95 размера ответа > 5000 chars = verbose drift обнаружен.
        # LLM начал генерировать слишком длинные ответы — нужна tune промпта.
        expr: histogram_quantile(0.95, rate(krab_model_response_chars_bucket[15m])) > 5000
        labels:
          severity: warning
          wave: "55-C"
        annotations:
          summary: "p95 response > 5000 chars — verbose drift detected"
          description: "LLM генерирует слишком длинные ответы (p95 > 5000 chars). Проверь промпт и system instructions. Model: {{ $labels.model }}."

  # ── Wave 70: dispatcher / swarm / paid Gemini guard probes ─────────────
  # Источник истины — /metrics endpoint (collect_metrics) + Wave 65-K snapshot.
  - name: krab_wave70_probes
    interval: 60s
    rules:
      - alert: MainDispatcherStarved
        # Wave 63-C: main dispatcher не тикнул > 10 мин → возможен split-brain
        # между Pyrofork polling и нашим dispatch loop. Filter -1 (placeholder
        # для cold-boot до kraab_running).
        expr: krab_main_dispatcher_tick_ago_seconds > 600
        for: 2m
        labels:
          severity: warning
          wave: "70"
        annotations:
          summary: "Main Krab dispatcher silent >10 min (possible split-brain)"
          description: "krab_main_dispatcher_tick_ago_seconds = {{ $value }}s. Возможен split-brain между Pyrofork polling и dispatch loop. Проверь логи `dispatcher_tick`, перезапусти Krab если нужно."

      - alert: SwarmTeamProbeStale
        # Wave 63-B: swarm pts не обновлялся > 30 мин для команды.
        expr: krab_swarm_probe_ago_seconds{team!="none"} > 1800
        for: 5m
        labels:
          severity: info
          wave: "70"
        annotations:
          summary: "Swarm team {{ $labels.team }} probe stale (>30 min)"
          description: "krab_swarm_probe_ago_seconds{team={{ $labels.team }}} = {{ $value }}s. Возможна потеря updates у swarm bot account."

      - alert: PaidGeminiGuardDisabled
        # Wave 67: hard runtime guard должен быть в block (1) или warn (0).
        # -1 = off → платный paid AI Studio endpoint доступен.
        expr: krab_paid_gemini_guard_mode == -1
        for: 5m
        labels:
          severity: warning
          wave: "70"
        annotations:
          summary: "Paid Gemini guard is OFF — risk of accidental paid requests"
          description: "KRAB_BLOCK_PAID_GEMINI_AI_STUDIO=off. Wave 67 hard guard disabled — paid AI Studio endpoint reachable. Verify это намеренно."

  # ── Wave 73: Smart Routing 5-stage observability ────────────────────────────
  - name: krab_wave73_smart_routing
    interval: 1m
    rules:
      - alert: SmartRoutingHighDenyRate
        # Smart Routing deny rate — ESSENTIAL поведение (~95% сообщений в группах
        # должны отбрасываться). Alert fires если deny rate > 95% за 15 мин
        # на 30+ мин — baseline guard на регрессию (Krab стал слишком молчаливым
        # либо counter rises unexpectedly).
        expr: |
          sum(rate(krab_smart_routing_decisions_total{outcome="deny"}[15m]))
          /
          sum(rate(krab_smart_routing_decisions_total[15m])) > 0.95
        for: 30m
        labels:
          severity: info
          wave: "73"
        annotations:
          summary: "Smart Routing deny rate > 95% for 30m"
          description: "Wave 73 baseline guard — verify trigger_detector работает корректно."

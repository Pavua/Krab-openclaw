# Krab Prometheus alert rules.
# Load from prometheus.yml via rule_files: ["krab_alerts.yml"]
#
# Три группы: critical, capacity, engagement.
# Документация: docs/PROMETHEUS_MONITORING.md

groups:
  # ── Critical: немедленное внимание ──────────────────────────────────────────
  - name: krab_critical
    interval: 30s
    rules:
      - alert: KrabLLMRouteDown
        expr: krab_llm_route_ok == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Krab LLM route failing for {{ $labels.provider }}/{{ $labels.model }}"
          description: "`krab_llm_route_ok` = 0 for 2 min. Check Gateway + provider OAuth."

      - alert: KrabMemoryValidatorOverload
        expr: krab_memory_validator_pending > 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory validator pending queue > 15 для 10+ мин"
          description: "Возможно injection attack или много legitimate рекуррентных запросов. Проверь `!memory confirm list`."

      - alert: KrabMetricsStale
        expr: (time() - krab_metrics_generated_at) > 120
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Krab /metrics endpoint stale (>2min)"
          description: "Krab возможно down или endpoint не отвечает. Проверь `!health` и процесс userbot."

  # ── Capacity: планирование ёмкости ──────────────────────────────────────────
  - name: krab_capacity
    interval: 5m
    rules:
      - alert: KrabArchiveGrowingFast
        expr: rate(krab_archive_messages_total[1h]) > 10000
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "archive.db растёт > 10k msgs/час"
          description: "Рассмотри корректировку retention policy или архивацию старых сообщений."

      - alert: KrabArchiveDBLarge
        expr: krab_archive_db_size_bytes > 1073741824  # 1 GiB
        labels:
          severity: warning
        annotations:
          summary: "archive.db > 1 GB — рассмотри partitioning/pruning"
          description: "Текущий размер: {{ $value | humanize1024 }}B."

      - alert: KrabAutoRestartSpiking
        expr: rate(krab_auto_restart_attempts_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Auto-restart attempts > 0.1/sec за 10 мин"
          description: "Service {{ $labels.service }} нестабилен — нужен manual investigation. Логи: `!log {{ $labels.service }}`."

  # ── Engagement: бизнес-сигналы ──────────────────────────────────────────────
  - name: krab_engagement
    interval: 5m
    rules:
      - alert: KrabInjectionSpike
        expr: rate(krab_memory_validator_injection_blocked_total[1h]) > 0.01
        labels:
          severity: info
        annotations:
          summary: "Injection attempts > 36 per hour"
          description: "Под atak'ом или нужна tune паттернов validator. См. `src/core/memory_validator.py`."

  # ── Wave 50-E: Wave 47-49 features (fallback chain / catchup / snapshots) ──
  # Метрики ниже опираются на счётчики, которые landing вместе с экспортёрами
  # для соответствующих событий (см. docs/CLAUDE_AUTO_PROMETHEUS.md → Pending).
  # Prometheus трактует отсутствующую серию как "no data" — alert просто не
  # сработает до первого scrape, никаких ложных алармов это не вызовет.
  - name: krab_wave_47_49
    interval: 1m
    rules:
      - alert: FallbackChainExhaustedAlert
        # Wave 48-B: model_fallback_engaged — переключение по цепочке fallback.
        # > 5 событий за 1ч = chain "ползёт" слишком часто, primary unhealthy.
        expr: increase(krab_model_fallback_engaged_total[1h]) > 5
        labels:
          severity: warning
          wave: "48-B"
        annotations:
          summary: "Fallback chain advanced > 5 раз за час"
          description: "Routing нестабилен. См. `!routes` и `route_switches.jsonl`. Вероятная причина: primary провайдер деградировал."

      - alert: CodexQuotaExhaustedAlert
        # Wave 47: codex_disabled_transition — codex-cli ушёл в quota cooldown.
        # Single occurrence — informational, не critical (есть auto-fallback).
        expr: increase(krab_codex_disabled_transition_total[24h]) > 0
        labels:
          severity: info
          wave: "47"
        annotations:
          summary: "Codex CLI исчерпал quota и переключился на cooldown"
          description: "Auto-fallback работает (см. !quota). Информационный сигнал — никаких ручных действий."

      - alert: MultiChatCatchupFailedAlert
        # Wave 49: startup_catchup_chat_failed — per-chat ошибка догонялки.
        # > 3 за час = systemic, не сетевой glitch.
        expr: increase(krab_startup_catchup_chat_failed_total[1h]) > 3
        labels:
          severity: warning
          wave: "49"
        annotations:
          summary: "Multi-chat catchup упал > 3 раз за час"
          description: "Возможна Pyrogram session corruption или Telegram-side rate-limit. Смотри `message_catchup.py` логи."

      - alert: StateSnapshotFailedAlert
        # Wave 49: state_snapshot_failed — снэпшот runtime state провалился.
        # Single occurrence — critical: при следующем рестарте потеряем context.
        expr: increase(krab_state_snapshot_failed_total[24h]) > 0
        labels:
          severity: critical
          wave: "49"
        annotations:
          summary: "State snapshot failed — рестарт может потерять context"
          description: "См. `src/core/state_snapshots.py`. Проверь права на ~/.openclaw/krab_runtime_state/ и свободное место."

      - alert: ProviderTimeoutHighAlert
        # provider_timeout — тайминг-ошибка от облачного провайдера.
        # > 10/min = провайдер деградировал, нужен manual switch.
        expr: rate(krab_provider_timeout_total[5m]) > (10 / 60)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "provider_timeout > 10/min для {{ $labels.provider }}"
          description: "Облачный провайдер тормозит. Рассмотри manual switch на резервный routing."

      - alert: RouteSwitchHighFrequencyAlert
        # Wave 48-B: routing flapping — > 20 переключений/ч = нестабильность.
        expr: increase(krab_model_fallback_engaged_total[1h]) > 20
        labels:
          severity: warning
          wave: "48-B"
        annotations:
          summary: "Route switches > 20/h — нестабильность routing"
          description: "Анализируй `!routes` и `route_switches.jsonl`: возможен flapping из-за двух одинаково больных провайдеров."

  # ── Wave 55-C: Timing histogram alerts ──────────────────────────────────────
  - name: krab_wave_55c_histograms
    interval: 1m
    rules:
      - alert: LongChainAdvanceAlert
        # Wave 55-C: среднее время chain advance > 30s за 5 мин = замедленное переключение.
        # Сигнализирует о длинных таймаутах провайдера перед advance (ожидание 30-90s ответа).
        expr: >
          rate(krab_chain_advance_duration_seconds_sum[5m])
          /
          rate(krab_chain_advance_duration_seconds_count[5m]) > 30
        for: 5m
        labels:
          severity: warning
          wave: "55-C"
        annotations:
          summary: "Chain advance avg > 30s за 5 мин — медленное переключение цепочки"
          description: "Провайдеры отвечают слишком долго перед таймаутом. Проверь `!routes` и логи provider_timeout. Возможна деградация сети или провайдера."

      - alert: ResponseSizeAnomalyAlert
        # Wave 55-C: p95 размера ответа > 5000 chars = verbose drift обнаружен.
        # LLM начал генерировать слишком длинные ответы — нужна tune промпта.
        expr: histogram_quantile(0.95, rate(krab_model_response_chars_bucket[15m])) > 5000
        labels:
          severity: warning
          wave: "55-C"
        annotations:
          summary: "p95 response > 5000 chars — verbose drift detected"
          description: "LLM генерирует слишком длинные ответы (p95 > 5000 chars). Проверь промпт и system instructions. Model: {{ $labels.model }}."

  # ── Wave 70: dispatcher / swarm / paid Gemini guard probes ─────────────
  # Источник истины — /metrics endpoint (collect_metrics) + Wave 65-K snapshot.
  - name: krab_wave70_probes
    interval: 60s
    rules:
      - alert: MainDispatcherStarved
        # Wave 63-C: main dispatcher не тикнул > 10 мин → возможен split-brain
        # между Pyrofork polling и нашим dispatch loop. Filter -1 (placeholder
        # для cold-boot до kraab_running).
        expr: krab_main_dispatcher_tick_ago_seconds > 600
        for: 2m
        labels:
          severity: warning
          wave: "70"
        annotations:
          summary: "Main Krab dispatcher silent >10 min (possible split-brain)"
          description: "krab_main_dispatcher_tick_ago_seconds = {{ $value }}s. Возможен split-brain между Pyrofork polling и dispatch loop. Проверь логи `dispatcher_tick`, перезапусти Krab если нужно."

      - alert: SwarmTeamProbeStale
        # Wave 63-B: swarm pts не обновлялся > 30 мин для команды.
        expr: krab_swarm_probe_ago_seconds{team!="none"} > 1800
        for: 5m
        labels:
          severity: info
          wave: "70"
        annotations:
          summary: "Swarm team {{ $labels.team }} probe stale (>30 min)"
          description: "krab_swarm_probe_ago_seconds{team={{ $labels.team }}} = {{ $value }}s. Возможна потеря updates у swarm bot account."

      - alert: PaidGeminiGuardDisabled
        # Wave 67: hard runtime guard должен быть в block (1) или warn (0).
        # -1 = off → платный paid AI Studio endpoint доступен.
        expr: krab_paid_gemini_guard_mode == -1
        for: 5m
        labels:
          severity: warning
          wave: "70"
        annotations:
          summary: "Paid Gemini guard is OFF — risk of accidental paid requests"
          description: "KRAB_BLOCK_PAID_GEMINI_AI_STUDIO=off. Wave 67 hard guard disabled — paid AI Studio endpoint reachable. Verify это намеренно."

  # ── Wave 73: Smart Routing 5-stage observability ────────────────────────────
  - name: krab_wave73_smart_routing
    interval: 1m
    rules:
      - alert: SmartRoutingHighDenyRate
        # Smart Routing deny rate — ESSENTIAL поведение (~95% сообщений в группах
        # должны отбрасываться). Alert fires если deny rate > 95% за 15 мин
        # на 30+ мин — baseline guard на регрессию (Krab стал слишком молчаливым
        # либо counter rises unexpectedly).
        expr: |
          sum(rate(krab_smart_routing_decisions_total{outcome="deny"}[15m]))
          /
          sum(rate(krab_smart_routing_decisions_total[15m])) > 0.95
        for: 30m
        labels:
          severity: info
          wave: "73"
        annotations:
          summary: "Smart Routing deny rate > 95% for 30m"
          description: "Wave 73 baseline guard — verify trigger_detector работает корректно."

  # ── Wave 74: Memory Phase 2 hybrid retrieval timing ─────────────────────────
  - name: krab_wave74_memory
    interval: 1m
    rules:
      - alert: MemoryRetrievalSlow
        # Wave 74: P95 retrieval > 5s означает degradation post-Vertex switch
        # (Wave 66 переключил rerank → Vertex; budget total ~2.5s typical).
        expr: histogram_quantile(0.95, rate(krab_memory_retrieval_duration_seconds_bucket{phase="total"}[5m])) > 5.0
        for: 10m
        labels:
          severity: warning
          wave: "74"
        annotations:
          summary: "Memory Phase 2 retrieval P95 > 5s (10 min)"
          description: "Hybrid retrieval (RRF+MMR+rerank) slow. Check Vertex latency или Gemini rerank quota throttle."

  # ── Wave 78: FinOps token-cost tracking ─────────────────────────────────────
  - name: krab_wave78_finops
    interval: 1m
    rules:
      - alert: HighHourlyTokenCost
        # Wave 78: burn rate > €5/час sustained = €120/день.
        # Post-Wave 66/67 leak fix контекст: €40/неделю при минимальной активности
        # = ~€0.24/час. €5/час = explosion (20×) — точно сигнал об аномалии.
        expr: rate(krab_completion_cost_eur_total[1h]) * 3600 > 5.0
        for: 15m
        labels:
          severity: warning
          wave: "78"
        annotations:
          summary: "Burn rate > €5/час за последний час"
          description: "Стоимость completions превысила €5/час (€120/день). Проверить runaway loops, leaked paid Gemini, или explosion thoughts-tokens. Drill-down: krab_tokens_consumed_total{kind='thoughts'} и krab_completion_cost_eur_total by (model)."

  # ── Wave 75: launchd cron health ────────────────────────────────────────────
  - name: krab_wave75_launchd
    interval: 1m
    rules:
      - alert: LaunchAgentFailed
        # Wave 75: cron job exit > 0 (positive = error, negative = signal terminate which is normal).
        expr: krab_launchd_last_exit_status > 0
        for: 10m
        labels:
          severity: warning
          wave: "75"
        annotations:
          summary: "LaunchAgent {{ $labels.label }} exit status = {{ $value }} (10+ min)"
          description: "Cron job failed. Check logs/{{ $labels.label }}.{out,err}.log."

  # ── Wave 88: cron schedule consistency ──────────────────────────────────────
  - name: krab_wave88_cron_schedule
    interval: 5m
    rules:
      - alert: CronScheduleStale
        # Wave 88: log mtime > 2× expected interval (или log отсутствует).
        # Снимок обновляется weekly LaunchAgent ai.krab.cron-schedule-audit.
        expr: krab_cron_schedule_stale > 0
        for: 1h
        labels:
          severity: info
          wave: "88"
        annotations:
          summary: "Cron LaunchAgent {{ $labels.label }} schedule stale"
          description: "Wave 88 audit видит, что log файл {{ $labels.label }} не обновлялся дольше 2× expected interval. Возможно cron не запускался. Проверь launchctl list grep {{ $labels.label }} и ~/.openclaw/krab_runtime_state/cron_schedule_audit.json."

  # ── Wave 79: Krab Ear backend health probe ──────────────────────────────────
  - name: krab_wave79_krab_ear
    interval: 1m
    rules:
      - alert: KrabEarDown
        # Wave 79: 5 consecutive probe failures (>= 5 minutes downtime @ 60s interval).
        # Алертит на регрессии вида Session 40 (SingleInstanceGuard deadlock).
        expr: krab_ear_consecutive_failures >= 5
        for: 5m
        labels:
          severity: warning
          wave: "79"
        annotations:
          summary: "Krab Ear backend unresponsive ({{ $value }} consecutive failures)"
          description: "KE /health probe failing for 5+ минут. Проверь Krab Ear процесс, launchctl list grep krab-ear, backend на :5005."

  # ── Wave 105: Backup integrity verification ─────────────────────────────────
  - name: krab_wave105_backup_verify
    interval: 5m
    rules:
      - alert: BackupCorruption
        # Wave 105: weekly verify (Sun 05:00) выставляет Gauge corrupt_count.
        # > 0 = sqlite integrity_check failed или SHA256/stat ошибка для
        # session/state/memory archive backup. Backup непригоден для restore.
        expr: krab_backup_corrupt_count > 0
        for: 10m
        labels:
          severity: critical
          wave: "105"
        annotations:
          summary: "Backup corruption detected ({{ $value }} files)"
          description: "См. `~/.openclaw/krab_runtime_state/backup_verify_log.json`. Запусти `venv/bin/python scripts/krab_backup_verify.py` для деталей; восстанови из older snapshot."

  # ── Wave 108: Moderation audit observability ────────────────────────────────
  - name: krab_wave108_moderation
    interval: 5m
    rules:
      - alert: HighModerationActivity
        expr: rate(krab_moderation_actions_total[1h]) > 0.05
        for: 30m
        labels: {severity: info, wave: "108"}
        annotations:
          summary: "High moderation actions rate (>3/hour for 30m)"
          description: "May indicate spam wave или incorrect ACL state."

  # ── Wave 109: MCP server health ─────────────────────────────────────────────
  - name: krab_wave109_mcp
    interval: 1m
    rules:
      - alert: MCPServerDown
        expr: krab_mcp_server_alive == 0
        for: 15m
        labels: {severity: warning, wave: "109"}
        annotations:
          summary: "MCP server {{ $labels.server }} down for 15m"
          description: "Tool calls к этому MCP вернут ошибку. Restart MCP server."

  # ── Wave 110: Dependency vuln scan ──────────────────────────────────────────
  - name: krab_wave110_dep_audit
    interval: 5m
    rules:
      - alert: CriticalDependencyVuln
        expr: krab_dependency_vulns_total{severity="critical"} > 0
        for: 1h
        labels: {severity: critical, wave: "110"}
        annotations:
          summary: "Critical CVE в зависимости Krab"
          description: "Run: venv/bin/pip-audit | grep CRITICAL"

  # ── Wave 111: Disk space ────────────────────────────────────────────────────
  - name: krab_wave111_disk
    interval: 1m
    rules:
      - alert: DiskSpaceLow
        expr: krab_disk_used_pct > 90
        for: 10m
        labels: {severity: warning, wave: "111"}
        annotations:
          summary: "Disk {{ $labels.mount }} > 90% used"
      - alert: DiskSpaceCritical
        expr: krab_disk_used_pct > 95
        for: 5m
        labels: {severity: critical, wave: "111"}
        annotations:
          summary: "Disk {{ $labels.mount }} > 95% used — DB corruption risk"

  # ── Wave 118: Session backup integrity ──────────────────────────────────────
  - name: krab_wave118_session_backup
    interval: 5m
    rules:
      - alert: SessionBackupCorrupt
        # Wave 118: weekly check (Mon 04:30) — Pyrofork session backups, у
        # которых таблица `sessions` (auth key) не читается. >0 = emergency
        # restore путь сломан, нужен manual fix или копия из state snapshot.
        expr: krab_session_backup_corrupt_count > 0
        for: 1h
        labels: {severity: critical, wave: "118"}
        annotations:
          summary: "Session backup corruption detected ({{ $value }} файла)"
          description: "Wave 118 weekly check нашёл corrupted Pyrofork session backups (data/sessions/*.session*.bak.*). Запусти `venv/bin/python scripts/krab_session_backup_check.py` для деталей. Auth key неперезаписан → emergency restore невозможен из этих backups."

  # ── Wave 118: Session backup integrity ──────────────────────────────────────
  - name: krab_wave118_backup
    interval: 5m
    rules:
      - alert: SessionBackupCorrupt
        expr: krab_session_backup_corrupt_count > 0
        for: 1h
        labels: {severity: critical, wave: "118"}
        annotations:
          summary: "Session backup corrupted — review data/sessions/*.bak.*"

  # ── Wave 119: Long sleep detect ─────────────────────────────────────────────
  - name: krab_wave119_idle
    interval: 5m
    rules:
      - alert: LongSleepDetected
        expr: increase(krab_idle_wake_gap_seconds_bucket{le="14400"}[1h]) > 0
        for: 1m
        labels: {severity: info, wave: "119"}
        annotations:
          summary: "Krab detected long sleep gap (>4h)"

  # ── Wave 121: Telegram rate limited extended ────────────────────────────────
  - name: krab_wave121_telegram_rate
    interval: 1m
    rules:
      - alert: TelegramRateLimitedExtended
        expr: krab_telegram_rate_limited_active == 1
        for: 30m
        labels: {severity: warning, wave: "121"}
        annotations:
          summary: "Telegram FloodWait active >30m for caller {{ $labels.caller }}"

  # ── Wave 124: OpenClaw gateway watchdog ─────────────────────────────────────
  - name: krab_wave124_openclaw_gateway
    interval: 30s
    rules:
      - alert: OpenClawGatewayDown
        expr: krab_openclaw_gateway_healthy == 0
        for: 2m
        labels: {severity: critical, wave: "124"}
        annotations:
          summary: "OpenClaw gateway :18789 unhealthy >2m"
          description: "Wave 124 watchdog: HTTP probe /health failed. Auto kickstart count: {{ $value }}. См. ~/.openclaw/krab_runtime_state/openclaw_watchdog_state.json и scripts/krab_openclaw_watchdog.py."

  # ── Wave 122/131: owner panel observability ──────────────────────────────────
  - name: krab_wave122_panel
    interval: 5m
    rules:
      - alert: HighPanelErrorRate
        expr: rate(krab_owner_panel_requests_total{status_class="5xx"}[5m]) > 0.1
        for: 10m
        labels: {severity: warning, wave: "122"}
        annotations:
          summary: "Owner panel 5xx rate > 0.1/sec for 10m"

  # ── Wave 124: OpenClaw gateway HTTP watchdog ─────────────────────────────────
  - name: krab_wave124_openclaw
    interval: 1m
    rules:
      - alert: OpenClawGatewayDown
        expr: krab_openclaw_gateway_healthy == 0
        for: 2m
        labels: {severity: critical, wave: "124"}
        annotations:
          summary: "OpenClaw gateway :18789 not responding /health"

  # ── Wave 126: MCP tool latency ────────────────────────────────────────────────
  - name: krab_wave126_mcp_tool
    interval: 5m
    rules:
      - alert: SlowMCPTool
        expr: histogram_quantile(0.95, rate(krab_mcp_tool_duration_seconds_bucket[5m])) > 10
        for: 30m
        labels: {severity: info, wave: "126"}
        annotations:
          summary: "MCP tool P95 > 10s for 30m"

  # ── Wave 128: LLM context near cap ────────────────────────────────────────────
  - name: krab_wave128_context
    interval: 5m
    rules:
      - alert: LLMContextNearCap
        expr: krab_llm_context_usage_pct > 0.8
        for: 5m
        labels: {severity: warning, wave: "128"}
        annotations:
          summary: "LLM context usage {{ $value }} > 80% for 5m"

  # ── Wave 129: capability cache stale ─────────────────────────────────────────
  - name: krab_wave129_capability_cache
    interval: 5m
    rules:
      - alert: CapabilityCacheStale
        expr: increase(krab_capability_cache_mismatches_total[7d]) > 5
        for: 1h
        labels: {severity: warning, wave: "129"}
        annotations:
          summary: "Capability cache >5 mismatches in 7d — audit needed"

  # ── Wave 130: SSL cert expiry ─────────────────────────────────────────────────
  - name: krab_wave130_ssl
    interval: 10m
    rules:
      - alert: SSLCertExpiringSoon
        expr: krab_ssl_cert_days_remaining < 14
        for: 1h
        labels: {severity: warning, wave: "130"}
        annotations:
          summary: "SSL cert {{ $labels.host }} expires in < 14 days"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krab Dashboard - Swarm</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg-color: #16213e;
            --text-color: #e0e0e0;
            --primary-color: #0f3460; /* Darker blue for accents/headers */
            --accent-color: #e94560; /* Reddish accent */
            --border-color: #0f3460;
            --success-color: #4CAF50;
            --warning-color: #FFC107;
            --danger-color: #F44336;
            --info-color: #2196F3;

            /* Task Status Colors */
            --pending-color: #FFC107; /* Warning yellow */
            --in-progress-color: #2196F3; /* Info blue */
            --done-color: #4CAF50; /* Success green */
            --failed-color: #F44336; /* Danger red */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            flex-grow: 1; /* Allows container to grow and push footer down */
        }

        header {
            background-color: var(--card-bg-color);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allow nav items to wrap on smaller screens */
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            display: block; /* Make links block-level for better click area */
        }

        nav ul li a:hover {
            background-color: var(--primary-color);
        }

        nav ul li a.active {
            background-color: var(--accent-color);
            font-weight: bold;
        }

        h1, h2, h3, h4 {
            color: var(--text-color);
            margin-top: 25px;
            margin-bottom: 15px;
        }
        h1 { font-size: 2.2em; }
        h3 { font-size: 1.5em; }
        h4 { font-size: 1.2em; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease;
            display: flex; /* Use flex for internal layout */
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #333; /* Default dark text for light badges */
        }
        .badge.in_progress, .badge.done, .badge.failed, .badge.on {
            color: var(--text-color); /* Light text for dark badges */
        }

        .badge.pending { background-color: var(--pending-color); }
        .badge.in_progress { background-color: var(--in-progress-color); }
        .badge.done { background-color: var(--done-color); }
        .badge.failed { background-color: var(--failed-color); }
        .badge.on { background-color: var(--done-color); }
        .badge.off { background-color: var(--failed-color); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9em;
        }

        table th, table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        table th {
            background-color: var(--primary-color);
            font-weight: bold;
            color: var(--text-color);
        }

        table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .team-breakdown ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .team-breakdown ul li {
            padding: 5px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .team-breakdown ul li:last-child {
            border-bottom: none;
        }

        .artifact-preview {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap; /* Preserve whitespace and wrap text */
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            font-size: 0.85em;
        }

        .toggle-preview-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 5px;
            text-decoration: underline;
            padding: 0;
        }
        .toggle-preview-btn:hover {
            color: var(--text-color);
        }

        .listeners-list ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        .listeners-list ul li {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .listeners-list ul li::before {
            content: '🤖'; /* Robot emoji for accounts */
            font-size: 1.2em;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            background-color: var(--card-bg-color);
            color: var(--text-color);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            nav ul {
                justify-content: space-around;
            }
            nav ul li {
                margin: 5px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr; /* Stack cards vertically */
            }
            table th, table td {
                padding: 8px; /* Smaller padding for tables */
            }
            .badge {
                font-size: 0.8em; /* Smaller badges */
                padding: 6px 10px;
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            .container { padding: 0 10px; }
            nav ul li a {
                padding: 6px 8px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">/</a>
        <a href="/stats">Stats</a>
        <a href="/inbox">Inbox</a>
        <a href="/costs">Costs</a>
        <a href="/swarm" class="active">Swarm</a>
        <a href="/translator">Translator</a>
    </nav>

    <div class="container">
        <h1>Swarm Dashboard</h1>

        <div id="loading" style="text-align:center;padding:40px;font-size:1.2em;color:#aaa;">Loading...</div>
        <div id="error" style="display:none;text-align:center;color:#F44336;padding:40px;font-size:1.1em;">Failed to load data. Please try again later.</div>

        <div id="dashboard-content" style="display:none;">
            <div class="badges-container" id="stats-badges"></div>

            <h3>Teams</h3>
            <div class="dashboard-grid" id="teams-grid"></div>

            <h3>Task Board</h3>
            <div class="card">
                <table id="task-table">
                    <thead>
                        <tr>
                            <th>Task ID</th>
                            <th>Team</th>
                            <th>Topic</th>
                            <th>Status</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="task-tbody"></tbody>
                </table>
            </div>

            <h3>Recent Reports</h3>
            <div id="reports-list"></div>

            <h3>Artifacts</h3>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Team</th>
                            <th>Type</th>
                            <th>Size</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="artifact-tbody"></tbody>
                </table>
            </div>

            <h3>Listeners</h3>
            <div class="card listeners-list">
                <ul id="listeners-ul"></ul>
            </div>
        </div>
    </div>

    <footer>
        <p>Krab Dashboard &mdash; Swarm &mdash; auto-refresh every 15s</p>
    </footer>

    <script>
        const APIS = {
            stats:     '/api/swarm/stats',
            teams:     '/api/swarm/teams',
            taskBoard: '/api/swarm/task-board',
            reports:   '/api/swarm/reports',
            artifacts: '/api/swarm/artifacts',
            listeners: '/api/swarm/listeners'
        };

        function fmtDate(ts) {
            if (!ts) return '—';
            const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
            return d.toLocaleString();
        }

        function statusBadgeClass(status) {
            if (!status) return 'pending';
            const s = status.toLowerCase().replace(/[- ]/g, '_');
            if (s.includes('progress') || s.includes('running')) return 'in_progress';
            if (s.includes('done') || s.includes('complet')) return 'done';
            if (s.includes('fail') || s.includes('error')) return 'failed';
            return 'pending';
        }

        function makeBadge(cls, text) {
            const span = document.createElement('span');
            span.className = 'badge ' + cls;
            span.textContent = text;
            return span;
        }

        function renderStats(data) {
            const el = document.getElementById('stats-badges');
            el.textContent = '';
            const items = [
                ['Total Tasks', data.total_tasks],
                ['Active Teams', data.active_teams],
                ['Done', data.done_tasks],
                ['Running', data.running_tasks],
                ['Failed', data.failed_tasks],
                ['Listeners', data.listener_count]
            ];
            items.forEach(([label, val]) => {
                el.appendChild(makeBadge('pending', label + ': ' + (val ?? '—')));
            });
        }

        function renderTeams(teams) {
            const grid = document.getElementById('teams-grid');
            grid.textContent = '';
            if (!teams || teams.length === 0) {
                const p = document.createElement('p');
                p.style.color = '#aaa';
                p.textContent = 'No team data available.';
                grid.appendChild(p);
                return;
            }
            teams.forEach(team => {
                const card = document.createElement('div');
                card.className = 'card';

                const h = document.createElement('h3');
                h.textContent = team.name || team.id || 'Unknown Team';
                card.appendChild(h);

                const ul = document.createElement('ul');
                ul.style.listStyle = 'none';
                ul.style.padding = '0';

                function addLi(label, value) {
                    const li = document.createElement('li');
                    li.style.padding = '4px 0';
                    li.style.borderBottom = '1px dashed rgba(255,255,255,0.1)';
                    const strong = document.createElement('strong');
                    strong.textContent = label + ': ';
                    li.appendChild(strong);
                    if (value instanceof Node) {
                        li.appendChild(value);
                    } else {
                        li.appendChild(document.createTextNode(String(value ?? '—')));
                    }
                    ul.appendChild(li);
                }

                addLi('Status', makeBadge(statusBadgeClass(team.status || 'idle'), team.status || 'idle'));
                addLi('Roles', (team.roles || []).join(', ') || '—');
                addLi('Tasks done', team.tasks_done ?? '—');
                addLi('Last active', fmtDate(team.last_active));

                card.appendChild(ul);
                grid.appendChild(card);
            });
        }

        function renderTasks(tasks) {
            const tbody = document.getElementById('task-tbody');
            tbody.textContent = '';
            if (!tasks || tasks.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 5;
                td.style.textAlign = 'center';
                td.style.color = '#aaa';
                td.textContent = 'No tasks.';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }
            tasks.forEach(t => {
                const tr = document.createElement('tr');
                [
                    t.id || '—',
                    t.team || '—',
                    t.topic || t.title || '—',
                    null,
                    fmtDate(t.created_at)
                ].forEach((val, i) => {
                    const td = document.createElement('td');
                    if (i === 3) {
                        td.appendChild(makeBadge(statusBadgeClass(t.status), t.status || '—'));
                    } else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function renderReports(reports) {
            const el = document.getElementById('reports-list');
            el.textContent = '';
            if (!reports || reports.length === 0) {
                const card = document.createElement('div');
                card.className = 'card';
                const p = document.createElement('p');
                p.style.color = '#aaa';
                p.textContent = 'No recent reports.';
                card.appendChild(p);
                el.appendChild(card);
                return;
            }
            reports.forEach(r => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.marginBottom = '12px';

                const h4 = document.createElement('h4');
                h4.textContent = (r.title || r.task_id || 'Report') + ' — ' + (r.team || '') + ' — ' + fmtDate(r.created_at);
                card.appendChild(h4);

                const pre = document.createElement('div');
                pre.className = 'artifact-preview';
                pre.textContent = r.summary || r.content || JSON.stringify(r, null, 2);
                card.appendChild(pre);

                el.appendChild(card);
            });
        }

        function renderArtifacts(artifacts) {
            const tbody = document.getElementById('artifact-tbody');
            tbody.textContent = '';
            if (!artifacts || artifacts.length === 0) {
                const tr = document.createElement('tr');
                const td = document.createElement('td');
                td.colSpan = 5;
                td.style.textAlign = 'center';
                td.style.color = '#aaa';
                td.textContent = 'No artifacts.';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }
            artifacts.forEach(a => {
                const tr = document.createElement('tr');
                [a.name || a.id || '—', a.team || '—', a.type || '—',
                 a.size != null ? a.size + ' B' : '—', fmtDate(a.created_at)].forEach(val => {
                    const td = document.createElement('td');
                    td.textContent = val;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        function renderListeners(listeners) {
            const ul = document.getElementById('listeners-ul');
            ul.textContent = '';
            if (!listeners || listeners.length === 0) {
                const li = document.createElement('li');
                li.style.color = '#aaa';
                li.textContent = 'No listeners configured.';
                ul.appendChild(li);
                return;
            }
            listeners.forEach(l => {
                const li = document.createElement('li');
                const active = l.active || l.enabled;
                li.appendChild(makeBadge(active ? 'on' : 'off', active ? 'ON' : 'OFF'));
                li.appendChild(document.createTextNode(' '));
                const name = document.createElement('strong');
                name.textContent = l.name || l.account || l.id || 'Unknown';
                li.appendChild(name);
                if (l.team) li.appendChild(document.createTextNode(' — Team: ' + l.team));
                if (l.chat_id) li.appendChild(document.createTextNode(' — Chat: ' + l.chat_id));
                ul.appendChild(li);
            });
        }

        async function fetchAll() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('dashboard-content');

            loading.style.display = 'block';
            error.style.display = 'none';

            try {
                const results = await Promise.allSettled([
                    fetch(APIS.stats).then(r => r.ok ? r.json() : {}),
                    fetch(APIS.teams).then(r => r.ok ? r.json() : []),
                    fetch(APIS.taskBoard).then(r => r.ok ? r.json() : []),
                    fetch(APIS.reports).then(r => r.ok ? r.json() : []),
                    fetch(APIS.artifacts).then(r => r.ok ? r.json() : []),
                    fetch(APIS.listeners).then(r => r.ok ? r.json() : [])
                ]);

                renderStats(results[0].value ?? {});
                renderTeams(results[1].value ?? []);
                renderTasks(results[2].value ?? []);
                renderReports(results[3].value ?? []);
                renderArtifacts(results[4].value ?? []);
                renderListeners(results[5].value ?? []);

                content.style.display = 'block';
            } catch (err) {
                console.error('Swarm fetch error:', err);
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchAll();
            setInterval(fetchAll, 15000);
        });
    </script>
</body>
</html>

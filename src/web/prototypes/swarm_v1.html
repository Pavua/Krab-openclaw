<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krab Dashboard - Swarm</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg-color: #16213e;
            --text-color: #e0e0e0;
            --primary-color: #0f3460; /* Darker blue for accents/headers */
            --accent-color: #e94560; /* Reddish accent */
            --border-color: #0f3460;
            --success-color: #4CAF50;
            --warning-color: #FFC107;
            --danger-color: #F44336;
            --info-color: #2196F3;

            /* Task Status Colors */
            --pending-color: #FFC107; /* Warning yellow */
            --in-progress-color: #2196F3; /* Info blue */
            --done-color: #4CAF50; /* Success green */
            --failed-color: #F44336; /* Danger red */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            flex-grow: 1; /* Allows container to grow and push footer down */
        }

        header {
            background-color: var(--card-bg-color);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Allow nav items to wrap on smaller screens */
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: var(--text-color);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            display: block; /* Make links block-level for better click area */
        }

        nav ul li a:hover {
            background-color: var(--primary-color);
        }

        nav ul li a.active {
            background-color: var(--accent-color);
            font-weight: bold;
        }

        h1, h2, h3, h4 {
            color: var(--text-color);
            margin-top: 25px;
            margin-bottom: 15px;
        }
        h1 { font-size: 2.2em; }
        h3 { font-size: 1.5em; }
        h4 { font-size: 1.2em; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease;
            display: flex; /* Use flex for internal layout */
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .badges-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #333; /* Default dark text for light badges */
        }
        .badge.in_progress, .badge.done, .badge.failed, .badge.on {
            color: var(--text-color); /* Light text for dark badges */
        }

        .badge.pending { background-color: var(--pending-color); }
        .badge.in_progress { background-color: var(--in-progress-color); }
        .badge.done { background-color: var(--done-color); }
        .badge.failed { background-color: var(--failed-color); }
        .badge.on { background-color: var(--done-color); }
        .badge.off { background-color: var(--failed-color); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9em;
        }

        table th, table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        table th {
            background-color: var(--primary-color);
            font-weight: bold;
            color: var(--text-color);
        }

        table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .team-breakdown ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .team-breakdown ul li {
            padding: 5px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }
        .team-breakdown ul li:last-child {
            border-bottom: none;
        }

        .artifact-preview {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap; /* Preserve whitespace and wrap text */
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            font-size: 0.85em;
        }

        .toggle-preview-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 5px;
            text-decoration: underline;
            padding: 0;
        }
        .toggle-preview-btn:hover {
            color: var(--text-color);
        }

        .listeners-list ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        .listeners-list ul li {
            background-color: rgba(0, 0, 0, 0.1);
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .listeners-list ul li::before {
            content: '🤖'; /* Robot emoji for accounts */
            font-size: 1.2em;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            background-color: var(--card-bg-color);
            color: var(--text-color);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            nav ul {
                justify-content: space-around;
            }
            nav ul li {
                margin: 5px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr; /* Stack cards vertically */
            }
            table th, table td {
                padding: 8px; /* Smaller padding for tables */
            }
            .badge {
                font-size: 0.8em; /* Smaller badges */
                padding: 6px 10px;
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            .container { padding: 0 10px; }
            nav ul li a {
                padding: 6px 8px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <

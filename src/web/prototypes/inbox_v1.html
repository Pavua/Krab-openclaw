<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krab Dashboard - Inbox</title>
    <style>
        /* Global Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #1a1a2e; /* Dark background */
            color: #e0e0e0; /* Light text */
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container for main content */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            flex-grow: 1;
        }

        /* Navbar */
        nav {
            background-color: #16213e; /* Slightly darker blue for navbar */
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: flex-start;
            gap: 25px;
            align-items: center;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 5px;
            transition: color 0.3s, background-color 0.3s;
        }

        nav a:hover {
            color: #ffffff;
            background-color: #2a3b5c;
        }

        nav a.active {
            color: #ffffff;
            background-color: #0f4c75; /* Active link highlight */
            font-weight: bold;
        }

        /* Header */
        h1 {
            color: #e0e0e0;
            margin-top: 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 .icon {
            font-size: 1.2em;
        }

        /* Section Styling */
        .section {
            background-color: #16213e; /* Card background */
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            color: #e0e0e0;
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3b5c;
            padding-bottom: 10px;
        }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .summary-card {
            background-color: #16213e;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.2s ease-in-out;
        }

        .summary-card:hover {
            transform: translateY(-5px);
        }

        .summary-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #3282b8; /* Accent color */
            margin-bottom: 5px;
        }

        .summary-card .label {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        /* Item List Table */
        .item-list-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .item-list-table th,
        .item-list-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2a3b5c;
        }

        .item-list-table th {
            background-color: #0f4c75; /* Darker blue for table header */
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .item-list-table tbody tr {
            background-color: #16213e;
            transition: background-color 0.2s ease-in-out;
            cursor: pointer;
        }

        .item-list-table tbody tr:hover {
            background-color: #2a3b5c;
        }

        .item-list-table .severity-emoji {
            font-size: 1.2em;
            margin-right: 5px;
        }

        .item-list-table .item-body {
            display: none; /* Hidden by default */
            padding: 10px 15px;
            background-color: #2a3b5c;
            color: #c0c0c0;
            font-size: 0.9em;
            border-top: 1px dashed #3f577a;
            white-space: pre-wrap; /* Preserve whitespace and line breaks */
        }

        .item-list-table .item-body.expanded {
            display: block;
        }

        /* Filter Buttons */
        .filter-buttons {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .filter-buttons button {
            background-color: #3282b8;
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s ease;
        }

        .filter-buttons button:hover {
            background-color: #2a6e9a;
        }

        .filter-buttons button.active {
            background-color: #0f4c75;
            font-weight: bold;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .quick-actions button {
            background-color: #3282b8;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
            flex-grow: 1;
            min-width: 150px;
        }

        .quick-actions button:hover {
            background-color: #2a6e9a;
        }

        .quick-actions button.danger {
            background-color: #e74c3c;
        }

        .quick-actions button.danger:hover {
            background-color: #c0392b;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .summary-cards {
                grid-template-columns: 1fr;
            }
            .item-list-table th,
            .item-list-table td {
                padding: 8px 10px;
                font-size: 0.9em;
            }
            .quick-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">← /</a>
        <a href="/stats">Stats</a>
        <a href="/inbox" class="active">Inbox</a>
        <a href="/costs">Costs</a>
        <a href="/swarm">Swarm</a>
        <a href="/translator">Translator</a>
    </nav>

    <div class="container">
        <h1><span class="icon">📬</span> Inbox</h1>

        <div class="summary-cards">
            <div class="summary-card">
                <div class="value" id="totalItemsCount">0</div>
                <div class="label">Total Items</div>
            </div>
            <div class="summary-card">
                <div class="value" id="openItemsCount">0</div>
                <div class="label">Open Items</div>
            </div>
            <div class="summary-card">
                <div class="value" id="attentionItemsCount">0</div>
                <div class="label">Attention Items</div>
            </div>
            <div class="summary-card">
                <div class="value" id="escalationsCount">0</div>
                <div class="label">Escalations</div>
            </div>
            <div class="summary-card">
                <div class="value">12 / 3</div>
                <div class="label">Fresh / Stale Open</div>
            </div>
            <div class="summary-card">
                <div class="value">5</div>
                <div class="label">Pending Reminders</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Item List</h2>
            <div class="filter-buttons">
                <button id="filterOpen" class="active">Open</button>
                <button id="filterAcked">Acked</button>
                <button id="filterAll">All</button>
            </div>
            <table class="item-list-table">
                <thead>
                    <tr>
                        <th>Severity</th>
                        <th>Title</th>
                        <th>Kind</th>
                        <th>Source</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="inboxItemsTableBody">
                    <!-- Items will be loaded here by JavaScript -->
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">Loading inbox items...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2 class="section-title">Quick Actions</h2>
            <div class="quick-actions">
                <button id="ackSelectedItem">Ack Selected Item</button>
                <button id="markDone">Mark as Done</button>
                <button id="cancelItem">Cancel Item</button>
                <button id="bulkAckOpenItems">Bulk Ack All Open Items</button>
            </div>
        </div>
    </div>

    <script>
        // Mock API responses for demonstration purposes
        const mockInboxStatus = {
            total_items: 125,
            open_items: 42,
            attention_items: 8,
            escalation_items: 3
        };

        const mockInboxItems = {
            items: [
                { id: 'item1', severity: 'critical', title: 'Database connection failed', kind: 'Alert', source: 'Monitoring', created_at: '2023-10-27T10:00:00Z', body: 'The primary database connection to `db-prod-01` has failed. Immediate action required. Check logs for more details.' },
                { id: 'item2', severity: 'error', title: 'API Gateway latency spike', kind: 'Incident', source: 'APM', created_at: '2023-10-27T09:45:00Z', body: 'Latency for `/api/v1/users` endpoint increased by 500ms in the last 5 minutes. Investigate load balancer or backend service.' },
                { id: 'item3', severity: 'warning', title: 'Disk usage high on webserver', kind: 'Warning', source: 'Monitoring', created_at: '2023-10-27T09:30:00Z', body: '/dev/sda1 on `web-03` is at 85% capacity. Consider cleanup or expansion. Current usage: 85.2%.' },
                { id: 'item4', severity: 'info', title: 'New user registered', kind: 'Event', source: 'Auth Service', created_at: '2023-10-27T09:15:00Z', body: 'User `john.doe@example.com` successfully registered. Welcome email sent.' },
                { id: 'item5', severity: 'error', title: 'Payment processing failed for user X', kind: 'Error', source: 'Payment Gateway', created_at: '2023-10-27T09:00:00Z', body: 'Transaction `TXN12345` failed for user `user-id-123`. Reason: Insufficient funds. Notify user.' },
                { id: 'item6', severity: 'warning', title: 'SSL certificate expiring soon', kind: 'Warning', source: 'Cert Manager', created_at: '2023-10-26T18:00:00Z', body: 'Certificate for `api.example.com` expires in 15 days. Renew ASAP.' },
                { id: 'item7', severity: 'critical', title: 'Service `auth-service` is down', kind: 'Alert', source: 'Monitoring', created_at: '2023-10-26T17:30:00Z', body: 'The `auth-service` pod is not running on any node. Users cannot log in. Check Kubernetes cluster status.' },
                { id: 'item8', severity: 'info', title: 'System update completed', kind: 'Event', source: 'System Admin', created_at: '2023-10-26T16:00:00Z', body: 'All production servers updated to latest patch level. Reboot required for some services.' },
                { id: 'item9', severity: 'warning', title: 'High memory usage on cache server', kind: 'Warning', source: 'Monitoring', created_at: '2023-10-26T15:00:00Z', body: 'Memory usage on `cache-01` is consistently above 90%. Consider scaling up or optimizing cache usage.' },
                { id: 'item10', severity: 'error', title: 'Failed to process daily report', kind: 'Job Failure', source: 'Batch Processor', created_at: '2023-10-26T14:00:00Z', body: 'Daily sales report generation failed due to a database timeout. Manual rerun needed.' },
            ]
        };

        // Severity emoji mapping
        const severityEmojis = {
            info: 'ℹ️',
            warning: '⚠️',
            error: '🔴',
            critical: '🚨'
        };

        // --- API Simulation Functions ---
        async function fetchInboxStatus() {
            // In a real application, this would be:
            // const response = await fetch('/api/inbox/status');
            // if (!response.ok) throw new Error('Failed to fetch inbox status');
            // return await response.json();
            return new Promise(resolve => setTimeout(() => resolve(mockInboxStatus), 300)); // Simulate network delay
        }

        async function fetchInboxItems(status = 'open', limit = 20) {
            // In a real application, this would be:
            // const response = await fetch(`/api/inbox/items?limit=${limit}&status=${status}`);
            // if (!response.ok) throw new Error('Failed to fetch inbox items');
            // return await response.json();
            // For this mock, we'll just return the predefined items, ignoring status for simplicity
            return new Promise(resolve => setTimeout(() => resolve(mockInboxItems), 500)); // Simulate network delay
        }

        // --- UI Update Functions ---
        async function updateSummaryCards() {
            try {
                const status = await fetchInboxStatus();
                document.getElementById('totalItemsCount').textContent = status.total_items;
                document.getElementById('openItemsCount').textContent = status.open_items;
                document.getElementById('attentionItemsCount').textContent = status.attention_items;
                document.getElementById('escalationsCount').textContent = status.escalation_items;
            } catch (error) {
                console.error('Error updating summary cards:', error);
                // Optionally display an error message on the dashboard
            }
        }

        async function updateInboxItems(filterStatus = 'open') {
            const tableBody = document.getElementById('inboxItemsTableBody');
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;">Loading items...</td></tr>`; // Show loading

            try {
                const data = await fetchInboxItems(filterStatus);
                tableBody.innerHTML = ''; // Clear loading message

                if (data.items.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;">No items found for status: ${filterStatus}</td></tr>`;
                    return;
                }

                data.items.forEach(item => {
                    const row = document.createElement('tr');
                    row.dataset.itemId = item.id; // Store item ID for potential actions

                    const createdAt = new Date(item.created_at).toLocaleString();

                    row.innerHTML = `
                        <td><span class="severity-emoji">${severityEmojis[item.severity] || '❓'}</span> ${item.severity}</td>
                        <td>${item.title}</td>
                        <td>${item.kind}</td>
                        <td>${item.source}</td>
                        <td>${createdAt}</td>
                    `;
                    tableBody.appendChild(row);

                    // Add expandable body row
                    const bodyRow = document.createElement('tr');
                    bodyRow.classList.add('item-detail-row'); // Class to identify detail rows
                    bodyRow.innerHTML = `<td colspan="5"><div class="item-body" id="itemBody-${item.id}">${item.body}</div></td>`;
                    tableBody.appendChild(bodyRow);

                    // Event listener for the main item row to toggle body
                    row.addEventListener('click', () => {
                        const itemBody = document.getElementById(`itemBody-${item.id}`);
                        itemBody.classList.toggle('expanded');
                    });
                });
            } catch (error) {
                console.error('Error updating inbox items:', error);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px; color: #e74c3c;">Failed to load items. Please try again.</td></tr>`;
            }
        }

        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            // Initial load
            updateSummaryCards();
            updateInboxItems('open');

            // Auto-refresh every 10 seconds
            setInterval(() => {
                updateSummaryCards();
                // Re-fetch items for the currently active filter
                const activeFilterButton = document.querySelector('.filter-buttons button.active');
                const currentFilter = activeFilterButton ? activeFilterButton.id.replace('filter', '').toLowerCase() : 'open';
                updateInboxItems(currentFilter);
            }, 10000);

            // Filter buttons
            document.getElementById('filterOpen').addEventListener('click', (e) => {
                document.querySelectorAll('.filter-buttons button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                updateInboxItems('open');
            });
            document.getElementById('filterAcked').addEventListener('click', (e) => {
                document.querySelectorAll('.filter-buttons button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                // In a real app, this would fetch /api/inbox/items?status=acked
                // For mock, we'll just show a message or the same items
                updateInboxItems('acked');
            });
            document.getElementById('filterAll').addEventListener('click', (e) => {
                document.querySelectorAll('.filter-buttons button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                // In a real app, this would fetch /api/inbox/items?status=all
                updateInboxItems('all');
            });

            // Quick Actions (dummy functionality for now)
            document.getElementById('ackSelectedItem').addEventListener('click', () => {
                alert('Ack Selected Item - (Not implemented)');
            });
            document.getElementById('markDone').addEventListener('click', () => {
                alert('Mark as Done - (Not implemented)');
            });
            document.getElementById('cancelItem').addEventListener('click', () => {
                alert('Cancel Item - (Not implemented)');
            });
            document.getElementById('bulkAckOpenItems').addEventListener('click', () => {
                if (confirm('Are you sure you want to bulk ack all open items?')) {
                    alert('Bulk Ack All Open Items - (Not implemented)');
                }
            });
        });
    </script>
</body>
</html>

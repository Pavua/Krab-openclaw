<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observability | Krab</title>
    <link href="/v4/liquid-glass.css" rel="stylesheet">
    <script src="/v4/i18n.js" defer></script>
    <script src="/v4/theme-toggle.js" defer></script>
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #0f0f13; color: #fff; }
        html[data-theme="light"] body { background: #f5f7fb; color: #0f172a; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        nav.topnav { display: flex; flex-wrap: wrap; gap: 0.75rem; padding: 0.75rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; align-items: center; }
        nav.topnav a { color: inherit; opacity: 0.65; text-decoration: none; }
        nav.topnav a.active { opacity: 1; border-bottom: 2px solid #7dd3fc; padding-bottom: 2px; }
        h1 { font-size: 1.75rem; margin: 0 0 0.5rem; }
        .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 1.5rem; }
        html[data-theme="light"] .subtitle { color: #475569; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .tab { padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            user-select: none; font-size: 0.85rem; }
        .tab.active { background: rgba(125,211,252,0.18); border-color: #7dd3fc; }
        html[data-theme="light"] .tab { background: rgba(15,23,42,0.04); border-color: rgba(15,23,42,0.12); }
        .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-bar input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: inherit; padding: 0.35rem 0.6rem; border-radius: 6px; font-size: 0.85rem; }
        html[data-theme="light"] .filter-bar input { background: #fff; border-color: rgba(15,23,42,0.15); }
        table.runs { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        table.runs th, table.runs td { padding: 0.55rem 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; vertical-align: top; }
        html[data-theme="light"] table.runs th, html[data-theme="light"] table.runs td { border-bottom-color: rgba(15,23,42,0.08); }
        table.runs th { color: rgba(255,255,255,0.55); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; }
        table.runs tbody tr { cursor: pointer; }
        table.runs tbody tr:hover { background: rgba(255,255,255,0.04); }
        .status-badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 4px;
            font-size: 0.75rem; font-weight: 600; }
        .status-badge.ok { background: rgba(34,197,94,0.15); color: #4ade80; }
        .status-badge.error { background: rgba(239,68,68,0.18); color: #f87171; }
        .status-badge.timeout { background: rgba(245,158,11,0.18); color: #fbbf24; }
        .prompt-preview { color: rgba(255,255,255,0.7); font-family: ui-monospace, monospace;
            font-size: 0.78rem; max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        html[data-theme="light"] .prompt-preview { color: #475569; }
        .empty { text-align: center; padding: 3rem; color: rgba(255,255,255,0.5); }
        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 100; justify-content: center; align-items: center; }
        .modal-backdrop.open { display: flex; }
        .modal { background: #1a1a22; border-radius: 12px; padding: 2rem;
            max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.12); }
        html[data-theme="light"] .modal { background: #fff; color: #0f172a; }
        .modal pre { background: rgba(0,0,0,0.3); padding: 0.8rem; border-radius: 6px;
            white-space: pre-wrap; word-break: break-word; font-size: 0.8rem;
            max-height: 300px; overflow-y: auto; }
        html[data-theme="light"] .modal pre { background: rgba(15,23,42,0.05); }
        .modal-close { float: right; background: transparent; border: none; color: inherit;
            font-size: 1.5rem; cursor: pointer; line-height: 1; }
        .kv { display: grid; grid-template-columns: 140px 1fr; gap: 0.4rem 1rem;
            margin-bottom: 1rem; font-size: 0.85rem; }
        .kv .k { color: rgba(255,255,255,0.55); }
    </style>
</head>
<body>
    <nav class="topnav">
        <a href="/v4/" class="nav-link" data-i18n="nav.hub">Главная</a>
        <a href="/v4/chat" class="nav-link" data-i18n="nav.chat">Чат</a>
        <a href="/costs" class="nav-link" data-i18n="nav.costs">Расходы</a>
        <a href="/inbox" class="nav-link" data-i18n="nav.inbox">Входящие</a>
        <a href="/swarm" class="nav-link" data-i18n="nav.swarm">Свёрм</a>
        <a href="/translator" class="nav-link" data-i18n="nav.translator">Переводчик</a>
        <a href="/ops" class="nav-link" data-i18n="nav.ops">Операции</a>
        <a href="/observability" class="nav-link active" data-i18n="nav.observability">Observability</a>
        <a href="/settings" class="nav-link" data-i18n="nav.settings">Настройки</a>
    </nav>

    <div class="container">
        <h1 data-i18n="observability.title">Observability — Agent Runs</h1>
        <p class="subtitle" data-i18n="observability.subtitle">Live и история runs Krab CLI bypass-агентов (codex/gemini-cli).</p>

        <div class="tabs">
            <div class="tab active" data-tab="all" data-i18n="observability.tab_all">Все</div>
            <div class="tab" data-tab="live" data-i18n="observability.tab_live">Live (10 мин)</div>
            <div class="tab" data-tab="completed" data-i18n="observability.tab_completed">24 часа</div>
            <div class="tab" data-tab="errors" data-i18n="observability.tab_errors">Ошибки</div>
        </div>

        <div class="filter-bar">
            <input id="f-chat" type="text" placeholder="chat_id" style="width:120px">
            <input id="f-model" type="text" placeholder="model substring" style="width:200px">
            <button class="tab" id="btn-refresh" data-i18n="observability.refresh">Обновить</button>
            <span id="status-line" style="margin-left:auto;font-size:0.8rem;opacity:0.6"></span>
        </div>

        <table class="runs">
            <thead>
                <tr>
                    <th data-i18n="observability.col_time">Время</th>
                    <th data-i18n="observability.col_chat">Чат</th>
                    <th data-i18n="observability.col_model">Модель</th>
                    <th data-i18n="observability.col_status">Статус</th>
                    <th data-i18n="observability.col_duration">Длительность</th>
                    <th data-i18n="observability.col_prompt">Запрос</th>
                </tr>
            </thead>
            <tbody id="runs-tbody">
                <tr><td colspan="6" class="empty" data-i18n="common.loading">Загрузка…</td></tr>
            </tbody>
        </table>
    </div>

    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <h2 data-i18n="observability.modal_title">Run Detail</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
    (function () {
        let currentTab = 'all';

        function fmtTime(ts) {
            if (!ts) return '—';
            return new Date(ts * 1000).toLocaleString();
        }
        function fmtDur(sec) {
            if (sec == null) return '—';
            if (sec < 1) return Math.round(sec * 1000) + 'ms';
            return sec.toFixed(2) + 's';
        }
        function el(tag, attrs, text) {
            const e = document.createElement(tag);
            if (attrs) for (const k in attrs) {
                if (k === 'class') e.className = attrs[k];
                else if (k === 'data') for (const dk in attrs.data) e.dataset[dk] = attrs.data[dk];
                else e.setAttribute(k, attrs[k]);
            }
            if (text != null) e.textContent = String(text);
            return e;
        }

        async function loadRuns() {
            const params = new URLSearchParams();
            if (currentTab === 'live') params.set('since', '10m');
            else if (currentTab === 'completed') params.set('since', '24h');
            else if (currentTab === 'errors') { params.set('since', '24h'); params.set('status', 'error'); }
            else params.set('since', '24h');
            params.set('limit', '300');
            const chat = document.getElementById('f-chat').value.trim();
            const model = document.getElementById('f-model').value.trim();
            if (chat) params.set('chat_id', chat);
            if (model) params.set('model', model);

            const statusLine = document.getElementById('status-line');
            statusLine.textContent = '⟳ загрузка…';
            try {
                const res = await fetch('/api/observability/runs?' + params);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                renderRuns(data.runs || []);
                statusLine.textContent = (data.runs || []).length + ' runs';
            } catch (e) {
                renderRuns([]);
                statusLine.textContent = 'ошибка: ' + e.message;
            }
        }

        function renderRuns(runs) {
            const tbody = document.getElementById('runs-tbody');
            tbody.replaceChildren();
            if (!runs.length) {
                const tr = el('tr');
                const td = el('td', {colspan:'6', class:'empty'}, 'Нет данных. CLI bypass run-ы появятся здесь после первого вызова codex/gemini.');
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }
            runs.forEach(r => {
                const tr = el('tr');
                tr.dataset.rid = r.request_id || '';
                tr.appendChild(el('td', null, fmtTime(r.ts_started)));
                tr.appendChild(el('td', null, r.chat_id || '—'));
                tr.appendChild(el('td', null, r.model || '—'));
                const tdStatus = el('td');
                tdStatus.appendChild(el('span', {class:'status-badge ' + (r.status || 'ok')}, r.status || 'ok'));
                tr.appendChild(tdStatus);
                tr.appendChild(el('td', null, fmtDur(r.duration_sec)));
                tr.appendChild(el('td', {class:'prompt-preview'}, r.prompt_excerpt || ''));
                tr.addEventListener('click', () => openModal(r.request_id));
                tbody.appendChild(tr);
            });
        }

        async function openModal(rid) {
            const backdrop = document.getElementById('modal-backdrop');
            const body = document.getElementById('modal-body');
            body.replaceChildren();
            body.appendChild(el('div', {class:'empty'}, 'Загрузка…'));
            backdrop.classList.add('open');
            try {
                const res = await fetch('/api/observability/run/' + encodeURIComponent(rid));
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const r = data.run || {};
                body.replaceChildren();
                const kv = el('div', {class:'kv'});
                const pairs = [
                    ['Request ID', r.request_id], ['Started', fmtTime(r.ts_started)],
                    ['Completed', fmtTime(r.ts_completed)], ['Duration', fmtDur(r.duration_sec)],
                    ['Model', r.model], ['Kind', r.kind],
                    ['Chat ID', r.chat_id || '—'], ['User ID', r.user_id || '—'],
                    ['Exit code', r.exit_code != null ? r.exit_code : '—'],
                    ['Prompt len', r.prompt_len || 0], ['Response len', r.response_len || 0],
                ];
                pairs.forEach(([k,v]) => {
                    kv.appendChild(el('div', {class:'k'}, k + ':'));
                    kv.appendChild(el('div', null, v));
                });
                body.appendChild(kv);
                const sb = el('div');
                sb.appendChild(el('span', {class:'k'}, 'Status: '));
                sb.appendChild(el('span', {class:'status-badge ' + (r.status||'ok')}, r.status||'ok'));
                sb.style.marginBottom = '0.8rem';
                body.appendChild(sb);
                body.appendChild(el('h3', null, 'Prompt excerpt'));
                body.appendChild(el('pre', null, r.prompt_excerpt || '(empty)'));
                body.appendChild(el('h3', null, 'Response excerpt'));
                body.appendChild(el('pre', null, r.response_excerpt || '(empty)'));
                if (r.stderr_excerpt) {
                    body.appendChild(el('h3', null, 'Stderr'));
                    body.appendChild(el('pre', null, r.stderr_excerpt));
                }
            } catch (e) {
                body.replaceChildren(el('div', {class:'empty'}, 'Ошибка: ' + e.message));
            }
        }

        function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.tab[data-tab]').forEach(t => {
                t.addEventListener('click', () => {
                    document.querySelectorAll('.tab[data-tab]').forEach(x => x.classList.remove('active'));
                    t.classList.add('active');
                    currentTab = t.dataset.tab;
                    loadRuns();
                });
            });
            document.getElementById('btn-refresh').addEventListener('click', loadRuns);
            document.getElementById('modal-close').addEventListener('click', closeModal);
            document.getElementById('modal-backdrop').addEventListener('click', (e) => {
                if (e.target.id === 'modal-backdrop') closeModal();
            });
            document.getElementById('f-chat').addEventListener('change', loadRuns);
            document.getElementById('f-model').addEventListener('change', loadRuns);
            loadRuns();
            setInterval(loadRuns, 15000);
        });
    })();
    </script>
</body>
</html>

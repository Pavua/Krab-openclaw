<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krab Dashboard - AI Chat</title>
    <link rel="stylesheet" href="/v4/liquid-glass.css">
    <script src="/v4/theme-toggle.js" defer></script>
    <style>
        /* Structural layout using variables assumed from liquid-glass.css */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-color, #0f0f13);
            color: var(--text-main, #ffffff);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Main Chat Area */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            z-index: 5;
        }
        .chat-header h2 { margin: 0; font-size: 1.25rem; font-weight: 600; }
        .mode-toggles { display: flex; gap: 0.5rem; background: var(--glass-bg, rgba(255,255,255,0.05)); padding: 0.25rem; border-radius: 2rem; }
        .mode-toggles .glass-pill { border: none; background: transparent; padding: 0.4rem 0.8rem; cursor: pointer; color: inherit; border-radius: 1.5rem; transition: background 0.2s; font-size: 0.85rem;}
        .mode-toggles .glass-pill.active { background: var(--glass-border, rgba(255,255,255,0.2)); font-weight: bold; }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .chat-bubble-user, .chat-bubble-assistant {
            max-width: 85%;
            padding: 0.85rem 1.25rem;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .chat-bubble-user {
            align-self: flex-end;
            background: var(--accent-color, #007aff);
            color: #fff;
            border-radius: 1.2rem 1.2rem 0 1.2rem;
        }
        .chat-bubble-assistant {
            align-self: flex-start;
            background: var(--glass-bg, rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            border-radius: 1.2rem 1.2rem 1.2rem 0;
            backdrop-filter: blur(10px);
        }

        /* Markdown elements */
        .chat-bubble-assistant pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.75rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            border: 1px solid var(--glass-border, rgba(255,255,255,0.05));
        }
        .chat-bubble-assistant code {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.4rem;
            border-radius: 0.3rem;
            font-size: 0.9em;
        }
        .chat-bubble-assistant pre code { padding: 0; background: transparent; }
        .chat-bubble-assistant p { margin: 0 0 0.5rem 0; }
        .chat-bubble-assistant p:last-child { margin: 0; }

        /* Tool Pills */
        .tool-pill {
            align-self: flex-start;
            background: var(--glass-bg, rgba(255,255,255,0.03));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            border-radius: 0.75rem;
            margin: 0.25rem 0;
            max-width: 90%;
            width: fit-content;
            overflow: hidden;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tool-pill-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            gap: 1.5rem;
            user-select: none;
        }
        .tool-pill-header .status-badge {
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 1rem;
            background: rgba(255,255,255,0.1);
            margin-left: 0.5rem;
            text-transform: uppercase;
        }
        .tool-pill-header .chevron { transition: transform 0.2s; opacity: 0.5; }
        .tool-pill.expanded .chevron { transform: rotate(180deg); }
        .tool-pill-detail {
            display: none;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass-border, rgba(255,255,255,0.1));
        }
        .tool-pill.expanded .tool-pill-detail { display: block; }
        .tool-pill pre { margin: 0.25rem 0 0.75rem 0; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 0.25rem; overflow-x: auto; font-size: 0.8rem; }
        
        /* Tool Mode Handling */
        body.mode-clean .tool-pill { display: none !important; }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 0.8rem 1.25rem;
            background: var(--glass-bg, rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            border-radius: 1.2rem 1.2rem 1.2rem 0;
            align-items: center;
            gap: 4px;
        }
        .typing-indicator .dot {
            width: 6px; height: 6px;
            background: var(--text-main, #fff);
            border-radius: 50%;
            opacity: 0.4;
            animation: blink 1.4s infinite both;
        }
        .typing-indicator .dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

        /* Input Bar */
        .chat-input-bar {
            padding: 1rem 1.5rem;
            background: var(--glass-bg, rgba(255,255,255,0.05));
            border-top: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            backdrop-filter: blur(10px);
            z-index: 5;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
        }
        .attachment-preview {
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: var(--glass-bg, rgba(255,255,255,0.1));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.2));
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            width: fit-content;
        }
        .attachment-preview .glass-btn {
            background: transparent; border: none; color: inherit; cursor: pointer;
            opacity: 0.6; padding: 0 4px; font-size: 0.8rem;
        }
        .attachment-preview .glass-btn:hover { opacity: 1; }
        
        .input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
        .glass-input {
            flex-grow: 1;
            resize: none;
            overflow-y: hidden;
            min-height: 44px;
            max-height: 150px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border, rgba(255,255,255,0.15));
            color: inherit;
            padding: 0.75rem 1rem;
            border-radius: 1.5rem;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.4;
            transition: border-color 0.2s;
        }
        .glass-input:focus { border-color: var(--accent-color, #007aff); }
        .glass-btn {
            height: 44px; width: 44px;
            border-radius: 50%;
            background: var(--glass-bg, rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border, rgba(255,255,255,0.1));
            color: inherit;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
            transition: background 0.2s;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.1); }
        .glass-button-primary {
            height: 44px; padding: 0 1.25rem;
            border-radius: 1.5rem;
            background: var(--accent-cyan, #7dd3fc);
            border: none; color: #0a0a1a; font-weight: 700;
            cursor: pointer; flex-shrink: 0; font-size: 0.95rem;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 4px 14px rgba(125,211,252,0.3);
        }
        .glass-button-primary:active { transform: scale(0.98); }
        .glass-button-primary:hover { opacity: 0.9; }
        .glass-button-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            .chat-bubble-user, .chat-bubble-assistant { max-width: 92%; }
            .chat-header { padding: 0.75rem 1rem; }
            .chat-header h2 { font-size: 1.1rem; }
            .chat-messages { padding: 1rem; }
            .chat-input-bar { padding: 0.75rem 1rem; }
            .mode-toggles .glass-pill { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        }

        /* Keyboard shortcuts overlays */
        .kbd-overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: flex-start; justify-content: center;
            padding-top: 15vh; z-index: 1000;
        }
        .kbd-overlay.hidden { display: none; }
        .kbd-palette, .kbd-help {
            background: rgba(20,20,41,0.95); backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border, rgba(255,255,255,0.15));
            border-radius: 16px; padding: 1rem; min-width: 480px;
            max-width: 90vw;
            box-shadow: 0 16px 64px rgba(0,0,0,0.6);
            color: var(--text-main, #fff);
        }
        .kbd-search {
            width: 100%; padding: 0.75rem 1rem; background: transparent;
            border: 1px solid var(--glass-border, rgba(255,255,255,0.15));
            border-radius: 10px;
            color: #fff; font-size: 1rem; outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }
        .kbd-search:focus { border-color: var(--accent-cyan, #7dd3fc); }
        .kbd-results { max-height: 50vh; overflow-y: auto; margin-top: 0.75rem; }
        .kbd-result {
            padding: 0.7rem 1rem; border-radius: 10px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .kbd-result.selected { background: rgba(125,211,252,0.15); }
        .kbd-result:hover { background: rgba(255,255,255,0.05); }
        .kbd-key {
            font-family: monospace; font-size: 0.75rem;
            background: rgba(255,255,255,0.1); padding: 0.2rem 0.5rem;
            border-radius: 6px; color: var(--text-muted, #aaa);
        }
        .kbd-help h3 { margin-top: 0; margin-bottom: 1rem; }
        .kbd-help-table { width: 100%; border-collapse: collapse; }
        .kbd-help-table td {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.1));
        }
        .kbd-help-table tr:last-child td { border-bottom: none; }
        .kbd-help-table td:first-child { width: 40%; }
        .kbd-help-table td:last-child { text-align: right; }
        .kbd-help .text-xs { font-size: 0.75rem; margin-top: 1rem; margin-bottom: 0; }
        .kbd-help .text-muted { color: var(--text-muted, #888); }
        .kbd-empty { padding: 0.7rem 1rem; color: var(--text-muted, #888); font-size: 0.9rem; }
    </style>
</head>

                <button class="glass-pill" data-mode="Debug">Debug</button>

    <script>
        // State
        let toolMode = localStorage.getItem("krab_tool_mode") || "Normal";
        let chatHistory = JSON.parse(localStorage.getItem("krab_chat_history") || "[]");
        let currentAttachmentSnippet = null;
        let activeEventSource = null;
        let currentAssistantContent = "";
        let currentAssistantMessageDiv = null;
        let activeToolPills = {}; // maps tool call id to DOM element

        const API_BASE = "";
        
        // DOM Elements
        const elements = {
            messages: document.getElementById('chat-messages'),
            input: document.getElementById('chat-input'),
            btnSend: document.getElementById('btn-send'),
            btnAttach: document.getElementById('btn-attach'),
            fileInput: document.getElementById('file-input'),
            attachmentPreview: document.getElementById('attachment-preview'),
            typingIndicator: document.getElementById('typing-indicator'),
            modeBtns: document.querySelectorAll('.mode-toggles .glass-pill')
        };

        // Initialize
        function init() {
            // Apply mode
            document.body.className = `mode-${toolMode.toLowerCase()}`;
            elements.modeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === toolMode);
            });

            // Render history
            chatHistory.forEach(msg => {
                if (msg.role === 'user') appendBubble('user', msg.content);
                else if (msg.role === 'assistant') appendBubble('assistant', msg.content);
            });
            scrollToBottom();
            
            // Event Listeners
            elements.modeBtns.forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });
            
            elements.input.addEventListener('input', autoResizeInput);
            elements.input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });
            
            elements.btnSend.addEventListener('click', sendMessage);
            elements.btnAttach.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', handleFileUpload);
        }

        function setMode(mode) {
            toolMode = mode;
            localStorage.setItem("krab_tool_mode", mode);
            document.body.className = `mode-${mode.toLowerCase()}`;
            elements.modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            
            // Update existing tool pills expansion state
            document.querySelectorAll('.tool-pill').forEach(pill => {
                if (mode === 'Debug') pill.classList.add('expanded');
                else pill.classList.remove('expanded');
            });
        }

        function autoResizeInput() {
            elements.input.style.height = 'auto';
            elements.input.style.height = (elements.input.scrollHeight) + 'px';
        }

        function scrollToBottom() {
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }

        function clearHistory() {
            if(!confirm('Clear all chat history?')) return;
            chatHistory = [];
            localStorage.removeItem("krab_chat_history");
            Array.from(elements.messages.children).forEach(child => {
                if (child.id !== 'typing-indicator') child.remove();
            });
        }

        function saveMessageToHistory(role, content) {
            chatHistory.push({ role, content });
            if (chatHistory.length > 50) chatHistory = chatHistory.slice(-50);
            localStorage.setItem("krab_chat_history", JSON.stringify(chatHistory));
        }

        // Markdown Parser (Basic)
        function parseMarkdown(text) {
            if (!text) return '';
            let html = text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") // Escape
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>') // Code blocks
                .replace(/`([^`]+)`/g, '<code>$1</code>') // Inline code
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>') // Bold
                .replace(/\*([^*]+)\*/g, '<em>$1</em>') // Italic
                .replace(/\n\n/g, '</p><p>') // Paragraphs
                .replace(/\n/g, '<br>'); // Line breaks
            return `<p>${html}</p>`;
        }

        function appendBubble(role, content) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant';
            div.innerHTML = role === 'assistant' ? parseMarkdown(content) : content.replace(/\n/g, '<br>');
            elements.messages.insertBefore(div, elements.typingIndicator);
            return div;
        }

        function createToolPill(id, name, args, status) {
            const pill = document.createElement('div');
            pill.className = `tool-pill ${toolMode === 'Debug' ? 'expanded' : ''}`;
            const safeArgs = typeof args === 'string' ? args : JSON.stringify(args, null, 2);
            
            pill.innerHTML = `
                <div class="tool-pill-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <span>🔧 <strong>${name}</strong> <span class="status-badge status-${status}">${status}</span></span>
                    <span class="chevron">▼</span>
                </div>
                <div class="tool-pill-detail">
                    <div><strong>Args:</strong><pre>${safeArgs}</pre></div>
                    <div class="result-box" style="display:none"><strong>Result:</strong><pre class="res-content"></pre></div>
                    <div class="timing-box" style="display:none; font-size:0.75rem; color:#888; margin-top:0.5rem;"></div>
                </div>
            `;
            elements.messages.insertBefore(pill, elements.typingIndicator);
            return pill;
        }

        function updateToolPill(pill, result, timing, status) {
            const badge = pill.querySelector('.status-badge');
            badge.textContent = status;
            badge.className = `status-badge status-${status}`;
            
            if (result !== undefined) {
                const resBox = pill.querySelector('.result-box');
                resBox.style.display = 'block';
                const safeRes = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
                resBox.querySelector('.res-content').textContent = safeRes;
            }
            if (timing) {
                const timeBox = pill.querySelector('.timing-box');
                timeBox.style.display = 'block';
                timeBox.textContent = `Execution time: ${timing}ms`;
            }
        }

        // File Attachment
        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            elements.attachmentPreview.style.display = 'inline-flex';
            elements.attachmentPreview.innerHTML = `⏳ Uploading ${file.name}...`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/api/assistant/attachment`, { method: 'POST', body: formData });
                const data = await res.json();
                currentAttachmentSnippet = data.snippet;
                elements.attachmentPreview.innerHTML = `📎 ${file.name} <button class="glass-btn" onclick="removeAttachment()">✖</button>`;
            } catch (err) {
                elements.attachmentPreview.innerHTML = `❌ Upload failed <button class="glass-btn" onclick="removeAttachment()">✖</button>`;
            }
            e.target.value = ''; 
        }

        window.removeAttachment = function() {
            currentAttachmentSnippet = null;
            elements.attachmentPreview.style.display = 'none';
        }

        // Send & Stream Logic
        function sendMessage() {
            if (activeEventSource) return; // Wait for current stream
            const text = elements.input.value.trim();
            if (!text && !currentAttachmentSnippet) return;

            let promptToLog = text;
            let promptToSend = text;

            if (currentAttachmentSnippet) {
                promptToSend = `${currentAttachmentSnippet}\n\n${text}`;
                if(!text) promptToLog = "[Attachment Sent]";
                removeAttachment();
            }

            // Clean UI
            elements.input.value = '';
            autoResizeInput();
            
            // Add user message
            appendBubble('user', promptToLog);
            saveMessageToHistory('user', promptToLog);
            scrollToBottom();

            // Prepare Assistant response container
            currentAssistantContent = "";
            currentAssistantMessageDiv = appendBubble('assistant', '');
            activeToolPills = {};

            // Start Stream
            elements.typingIndicator.style.display = 'flex';
            scrollToBottom();
            elements.btnSend.disabled = true;

            const url = `${API_BASE}/api/assistant/stream?prompt=${encodeURIComponent(promptToSend)}`;
            activeEventSource = new EventSource(url);

            activeEventSource.addEventListener('message', (e) => {
                elements.typingIndicator.style.display = 'none';
                try {
                    const data = JSON.parse(e.data);
                    if (data.reply) {
                        currentAssistantContent += data.reply;
                        currentAssistantMessageDiv.innerHTML = parseMarkdown(currentAssistantContent);
                        scrollToBottom();
                    }
                } catch(err){}
            });

            activeEventSource.addEventListener('tool_start', (e) => {
                elements.typingIndicator.style.display = 'none';
                try {
                    const data = JSON.parse(e.data);
                    const pill = createToolPill(data.id, data.name, data.args, 'running');
                    // Move current assistant div BELOW the new tool pill
                    elements.messages.insertBefore(pill, currentAssistantMessageDiv);
                    activeToolPills[data.id] = pill;
                    scrollToBottom();
                } catch(err){}
            });

            activeEventSource.addEventListener('tool_done', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    const pill = activeToolPills[data.id];
                    if (pill) updateToolPill(pill, data.result, data.timing, 'done');
                    elements.typingIndicator.style.display = 'flex'; // resume typing dots while waiting for final text
                    scrollToBottom();
                } catch(err){}
            });

            activeEventSource.addEventListener('done', () => {
                closeStream();
                if (currentAssistantContent) saveMessageToHistory('assistant', currentAssistantContent);
            });

            activeEventSource.addEventListener('error', () => {
                closeStream();
                if(!currentAssistantContent) currentAssistantMessageDiv.innerHTML = "<em>Error connecting to Assistant.</em>";
            });
        }

        function closeStream() {
            if (activeEventSource) {
                activeEventSource.close();
                activeEventSource = null;
            }
            elements.typingIndicator.style.display = 'none';
            elements.btnSend.disabled = false;
            scrollToBottom();
        }

        // Run
        init();

        async function updateBellCount() {
          try {
            const [inboxRes, opsRes] = await Promise.all([
              fetch('/api/inbox/status').catch(() => null),
              fetch('/api/ops/alerts').catch(() => null)
            ]);

            const inboxData = (inboxRes && inboxRes.ok) ? await inboxRes.json().catch(() => ({})) : {};
            const opsData = (opsRes && opsRes.ok) ? await opsRes.json().catch(() => ({})) : {};

            const summary = inboxData.summary || {};
            const latestItems = Array.isArray(summary.latest_open_items) ? summary.latest_open_items.slice(0, 5) : [];
            const alerts = Array.isArray(opsData.alerts) ? opsData.alerts.slice(0, 3) : [];

            let total = 0;
            if (typeof summary.open_items === 'number' || typeof summary.attention_items === 'number') {
              total = (summary.open_items || 0) + (summary.attention_items || 0);
            } else {
              total = latestItems.length + alerts.length;
            }

            const countEl = document.getElementById('nav-bell-count');
            if (countEl) {
              if (total > 0) {
                countEl.textContent = total > 99 ? '99+' : String(total);
                countEl.classList.remove('hidden');
              } else {
                countEl.classList.add('hidden');
              }
            }

            const dropdown = document.getElementById('bell-dropdown');
            if (!dropdown) return;

            dropdown.innerHTML = '';

            if (alerts.length === 0 && latestItems.length === 0) {
              const emptyDiv = document.createElement('div');
              emptyDiv.className = 'bell-dropdown-empty';
              emptyDiv.textContent = 'Нет уведомлений';
              dropdown.appendChild(emptyDiv);
            } else {
              if (alerts.length > 0) {
                const header = document.createElement('div');
                header.className = 'bell-dropdown-header';
                header.textContent = 'ALERTS';
                dropdown.appendChild(header);

                alerts.forEach(alert => {
                  const a = document.createElement('a');
                  a.className = 'bell-dropdown-item';
                  a.href = '/v4/ops';
          
                  const dot = document.createElement('span');
                  dot.className = `bell-dropdown-severity ${alert.severity || 'error'}`;
          
                  const text = document.createTextNode(alert.title || alert.message || alert.code || 'Alert');
          
                  a.appendChild(dot);
                  a.appendChild(text);
                  dropdown.appendChild(a);
                });
              }

              if (latestItems.length > 0) {
                const header = document.createElement('div');
                header.className = 'bell-dropdown-header';
                header.textContent = 'INBOX';
                dropdown.appendChild(header);

                latestItems.forEach(item => {
                  const a = document.createElement('a');
                  a.className = 'bell-dropdown-item';
                  a.href = `/v4/inbox#${item.id || item.item_id || ''}`;
          
                  const dot = document.createElement('span');
                  dot.className = `bell-dropdown-severity ${item.severity || 'info'}`;
          
                  const text = document.createTextNode(item.title || 'Notification');
          
                  a.appendChild(dot);
                  a.appendChild(text);
                  dropdown.appendChild(a);
                });
              }
            }

            const footer = document.createElement('a');
            footer.className = 'bell-dropdown-footer';
            footer.href = '/v4/inbox';
            footer.textContent = 'Открыть все →';
            footer.style.display = 'block';
            footer.style.textDecoration = 'none';
            dropdown.appendChild(footer);

          } catch (err) {
            console.error(err);
          }
        }

        setInterval(updateBellCount, 30000);
        updateBellCount();

        const navBell = document.querySelector('.nav-bell');
        if (navBell) {
          const bellWrapper = navBell.closest('.nav-bell-wrapper');
          const bellDropdown = document.getElementById('bell-dropdown');
  
          if (bellWrapper && bellDropdown) {
            navBell.addEventListener('click', (e) => {
              e.preventDefault();
              bellDropdown.classList.toggle('hidden');
            });

            document.addEventListener('click', (e) => {
              if (!bellWrapper.contains(e.target)) {
                bellDropdown.classList.add('hidden');
              }
            });

            document.addEventListener('keydown', (e) => {
              if (e.key === 'Escape') {
                bellDropdown.classList.add('hidden');
              }
            });
          }
        }

        // ============================================================
        // Keyboard Shortcuts: Cmd+K quick nav / Cmd+/ help / Cmd+Enter / Esc
        // ============================================================
        (function initKeyboardShortcuts() {
            const PAGES = [
                { name: 'Hub', url: '/v4/' },
                { name: 'Chat', url: '/v4/chat' },
                { name: 'Costs', url: '/v4/costs' },
                { name: 'Inbox', url: '/v4/inbox' },
                { name: 'Swarm', url: '/v4/swarm' },
                { name: 'Translator', url: '/v4/translator' },
                { name: 'Ops', url: '/v4/ops' },
                { name: 'Research', url: '/v4/research' }
            ];

            const isMac = navigator.platform.toUpperCase().includes('MAC');
            const modKey = isMac ? 'metaKey' : 'ctrlKey';

            const paletteOverlay = document.getElementById('kbd-palette-overlay');
            const helpOverlay = document.getElementById('kbd-help-overlay');
            const kbdSearch = document.getElementById('kbd-search');
            const kbdResults = document.getElementById('kbd-results');

            let selectedIndex = 0;
            let currentMatches = [];

            function fuzzyMatch(query, items) {
                const q = (query || '').trim().toLowerCase();
                if (!q) return items.slice();
                const subs = [];
                const acros = [];
                for (const item of items) {
                    const n = item.name.toLowerCase();
                    if (n.includes(q)) {
                        subs.push(item);
                        continue;
                    }
                    let qi = 0;
                    for (let i = 0; i < n.length && qi < q.length; i++) {
                        if (n[i] === q[qi]) qi++;
                    }
                    if (qi === q.length) acros.push(item);
                }
                return subs.concat(acros);
            }

            function clearNode(node) {
                while (node.firstChild) node.removeChild(node.firstChild);
            }

            function renderResults() {
                clearNode(kbdResults);
                if (currentMatches.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'kbd-empty';
                    empty.textContent = 'No matches';
                    kbdResults.appendChild(empty);
                    return;
                }
                currentMatches.forEach((item, idx) => {
                    const row = document.createElement('div');
                    row.className = 'kbd-result' + (idx === selectedIndex ? ' selected' : '');
                    row.dataset.index = String(idx);
                    const label = document.createElement('span');
                    label.textContent = item.name;
                    const hint = document.createElement('span');
                    hint.className = 'kbd-key';
                    hint.textContent = item.url;
                    row.appendChild(label);
                    row.appendChild(hint);
                    row.addEventListener('click', () => {
                        selectedIndex = idx;
                        navigateSelected();
                    });
                    row.addEventListener('mouseenter', () => {
                        selectedIndex = idx;
                        updateSelectionHighlight();
                    });
                    kbdResults.appendChild(row);
                });
            }

            function updateSelectionHighlight() {
                const rows = kbdResults.querySelectorAll('.kbd-result');
                rows.forEach((r, idx) => r.classList.toggle('selected', idx === selectedIndex));
                const sel = rows[selectedIndex];
                if (sel && typeof sel.scrollIntoView === 'function') {
                    sel.scrollIntoView({ block: 'nearest' });
                }
            }

            function navigateSelected() {
                if (!currentMatches.length) return;
                const target = currentMatches[selectedIndex];
                if (target && target.url) {
                    window.location.href = target.url;
                }
            }

            function openPalette() {
                closeHelp();
                paletteOverlay.classList.remove('hidden');
                kbdSearch.value = '';
                selectedIndex = 0;
                currentMatches = PAGES.slice();
                renderResults();
                setTimeout(() => kbdSearch.focus(), 0);
            }

            function closePalette() {
                paletteOverlay.classList.add('hidden');
            }

            function openHelp() {
                closePalette();
                helpOverlay.classList.remove('hidden');
            }

            function closeHelp() {
                helpOverlay.classList.add('hidden');
            }

            function closeAllModals() {
                closePalette();
                closeHelp();
            }

            kbdSearch.addEventListener('input', () => {
                currentMatches = fuzzyMatch(kbdSearch.value, PAGES);
                selectedIndex = 0;
                renderResults();
            });

            kbdSearch.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (currentMatches.length) {
                        selectedIndex = (selectedIndex + 1) % currentMatches.length;
                        updateSelectionHighlight();
                    }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentMatches.length) {
                        selectedIndex = (selectedIndex - 1 + currentMatches.length) % currentMatches.length;
                        updateSelectionHighlight();
                    }
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    navigateSelected();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closePalette();
                }
            });

            paletteOverlay.addEventListener('click', (e) => {
                if (e.target === paletteOverlay) closePalette();
            });
            helpOverlay.addEventListener('click', (e) => {
                if (e.target === helpOverlay) closeHelp();
            });

            document.addEventListener('keydown', (e) => {
                const mod = e[modKey];

                // Cmd+K / Ctrl+K → quick nav palette
                if (mod && !e.shiftKey && !e.altKey && (e.key === 'k' || e.key === 'K')) {
                    e.preventDefault();
                    if (paletteOverlay.classList.contains('hidden')) openPalette();
                    else closePalette();
                    return;
                }

                // Cmd+/ / Ctrl+/ → help overlay
                if (mod && !e.shiftKey && !e.altKey && e.key === '/') {
                    e.preventDefault();
                    if (helpOverlay.classList.contains('hidden')) openHelp();
                    else closeHelp();
                    return;
                }

                // Cmd+Enter / Ctrl+Enter → send message
                if (mod && e.key === 'Enter') {
                    if (!paletteOverlay.classList.contains('hidden')) return; // palette owns Enter
                    e.preventDefault();
                    sendMessage();
                    return;
                }

                // Esc → close any open modal
                if (e.key === 'Escape') {
                    const paletteOpen = !paletteOverlay.classList.contains('hidden');
                    const helpOpen = !helpOverlay.classList.contains('hidden');
                    if (paletteOpen || helpOpen) {
                        e.preventDefault();
                        closeAllModals();
                    }
                }
            });
        })();
    </script>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Krab AI Dashboard</title>
  <link rel="stylesheet" href="/v4/liquid-glass.css">
  <style>
    body { padding-top: 56px; }
    .glass-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
    .attachment-preview { position: absolute; bottom: 100%; left: 1.5rem; background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur)); border: 1px solid var(--accent-cyan); padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.75rem; display: none; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; box-shadow: var(--glass-shadow); }
    .attachment-preview.active { display: flex; }
    .remove-attach { cursor: pointer; color: var(--accent-red); font-weight: bold; }
    .typing-indicator { display: flex; gap: 4px; padding: 0.5rem 1rem; align-items: center; font-size: 0.875rem; color: var(--text-muted); }
    .typing-indicator span { width: 6px; height: 6px; background: var(--accent-cyan); border-radius: 50%; animation: pulse 1.5s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    .icon { width: 1.25rem; height: 1.25rem; fill: currentColor; }
    @media (max-width: 768px) {
      .chat-input-bar { position: fixed; bottom: calc(72px + env(safe-area-inset-bottom)); left: 0; right: 0; }
    }
  </style>
</head>
<body>
  <nav class="glass-nav">
    <div class="nav-logo">Krab</div>
    <div class="nav-links">
      <a href="/v4/" class="nav-link">Hub</a>
      <a href="/v4/chat" class="nav-link active">Chat</a>
      <a href="/v4/costs" class="nav-link">Costs</a>
      <a href="/v4/inbox" class="nav-link">Inbox</a>
      <a href="/v4/swarm" class="nav-link">Swarm</a>
      <a href="/v4/translator" class="nav-link">Translator</a>
      <div class="mode-toggle">
        <input type="radio" id="mode-debug" name="tool-mode" value="debug">
        <label for="mode-debug">Debug</label>
        <input type="radio" id="mode-normal" name="tool-mode" value="normal" checked>
        <label for="mode-normal">Normal</label>
        <input type="radio" id="mode-clean" name="tool-mode" value="clean">
        <label for="mode-clean">Clean</label>
      </div>
    </div>
    <div class="nav-actions" style="display: flex; align-items: center; gap: 1rem;">
      <button id="btn-clear-history" class="glass-button" title="Очистить историю" style="background: transparent; border: none; cursor: pointer; color: var(--text-muted); padding: 0; display: flex;">
        <svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
      <div class="nav-bell">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <div class="badge">3</div>
      </div>
    </div>
  </nav>
  <main class="chat-container">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <div class="attachment-preview" id="attach-preview">
        <span>Файл прикреплен</span>
        <span class="remove-attach" id="remove-attach">x</span>
      </div>
      <input type="file" id="file-input" style="display: none;">
      <button class="glass-button" id="btn-attach" title="Прикрепить файл">
        <svg class="icon" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-3.31-2.69-6-6-6S3 1.69 3 5v11.5c0 3.87 3.13 7 7 7s7-3.13 7-7V6h-1.5z"/></svg>
      </button>
      <input type="text" class="glass-input" id="chat-input" placeholder="Введите сообщение для Krab..." autocomplete="off">
      <button class="glass-button-primary" id="btn-send">
        <svg class="icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </main>
  <nav class="glass-tab-bar">
    <a href="/v4/" class="tab-item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9l-8-6zm6 16h-3v-6H9v6H6v-9l6-4.5 6 4.5v9z"/></svg>
      <span>Hub</span>
    </a>
    <a href="/v4/chat" class="tab-item active">
      <svg class="icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <span>Chat</span>
    </a>
    <a href="/v4/costs" class="tab-item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
      <span>Costs</span>
    </a>
    <a href="/v4/inbox" class="tab-item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M19 3H4.99c-1.11 0-1.98.89-1.98 2L3 19c0 1.1.88 2 1.99 2H19c1.1 0 2-.9 2-2V5c0-1.11-.9-2-2-2zm0 12h-4c0 1.66-1.35 3-3 3s-3-1.34-3-3H4.99V5H19v10z"/></svg>
      <span>Inbox</span>
    </a>
    <a href="/v4/swarm" class="tab-item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Swarm</span>
    </a>
    <a href="/v4/translator" class="tab-item">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
      <span>Translator</span>
    </a>
  </nav>
  <script>
    const state = { token: localStorage.getItem('krab_web_key') || null, mode: localStorage.getItem('krab_tool_mode') || 'normal', history: JSON.parse(localStorage.getItem('krab_chat_history') || '[]'), attachmentSnippet: null, currentEventSource: null };
    const DOM = { messages: document.getElementById('chat-messages'), input: document.getElementById('chat-input'), btnSend: document.getElementById('btn-send'), btnAttach: document.getElementById('btn-attach'), fileInput: document.getElementById('file-input'), attachPreview: document.getElementById('attach-preview'), btnRemoveAttach: document.getElementById('remove-attach'), modeRadios: document.querySelectorAll('input[name="tool-mode"]'), btnClearHistory: document.getElementById('btn-clear-history') };
    function init() {
      const activeRadio = document.querySelector(`input[name="tool-mode"][value="${state.mode}"]`);
      if (activeRadio) activeRadio.checked = true;
      state.history.forEach(msg => { if (msg.type === 'message') renderMessage(msg.role, msg.content, false); if (msg.type === 'tool') renderToolPill(msg.name, msg.args, msg.result, msg.status, false); });
      scrollToBottom();
      setupListeners();
    }
    function parseMarkdown(text) { if (!text) return ''; return text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>').replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>').replace(/\n/g, '<br>'); }
    function scrollToBottom() { DOM.messages.scrollTop = DOM.messages.scrollHeight; }
    function saveHistory() { if (state.history.length > 50) state.history = state.history.slice(-50); localStorage.setItem('krab_chat_history', JSON.stringify(state.history)); }
    function renderMessage(role, text, save = true) { const div = document.createElement('div'); div.className = role === 'user' ? 'chat-bubble-user' : 'chat-bubble-assistant'; div.innerHTML = parseMarkdown(text); DOM.messages.appendChild(div); if (save) { state.history.push({ type: 'message', role, content: text }); saveHistory(); } scrollToBottom(); return div; }
    function renderToolPill(name, args, result, status, save = true) { const pill = document.createElement('div'); pill.className = 'tool-pill'; pill.setAttribute('data-mode', state.mode); pill.id = 'tool-' + Date.now(); const dotClass = status === 'running' ? 'warning' : (status === 'error' ? 'error' : 'ok'); pill.innerHTML = `<div class="tool-pill-header"><div class="flex items-center gap-2"><span class="status-dot ${dotClass}"></span><strong>${name}</strong></div></div><div class="tool-pill-detail"><div class="text-xs text-muted mb-1">Arguments:</div><div>${args || '{}'}</div><div class="text-xs text-muted mt-2 mb-1">Result:</div><div class="tool-result">${result || 'Running...'}</div></div>`; pill.addEventListener('click', () => { if (state.mode === 'debug') return; const detail = pill.querySelector('.tool-pill-detail'); detail.style.display = detail.style.display === 'block' ? 'none' : 'block'; }); DOM.messages.appendChild(pill); if (save) { state.history.push({ type: 'tool', name, args, result, status }); saveHistory(); } scrollToBottom(); return pill; }
    function updateToolPill(pill, result, status) { const dot = pill.querySelector('.status-dot'); dot.className = `status-dot ${status === 'error' ? 'error' : 'ok'}`; const resultDiv = pill.querySelector('.tool-result'); resultDiv.textContent = result; const name = pill.querySelector('strong').textContent; for (let i = state.history.length - 1; i >= 0; i--) { if (state.history[i].type === 'tool' && state.history[i].name === name && state.history[i].status === 'running') { state.history[i].result = result; state.history[i].status = status; saveHistory(); break; } } }
    function showTypingIndicator() { const div = document.createElement('div'); div.className = 'typing-indicator'; div.id = 'typing-indicator'; div.innerHTML = '<span></span><span></span><span></span>'; DOM.messages.appendChild(div); scrollToBottom(); }
    function hideTypingIndicator() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }
    function setupListeners() { DOM.modeRadios.forEach(radio => { radio.addEventListener('change', (e) => { state.mode = e.target.value; localStorage.setItem('krab_tool_mode', state.mode); document.querySelectorAll('.tool-pill').forEach(pill => { pill.setAttribute('data-mode', state.mode); pill.querySelector('.tool-pill-detail').style.display = ''; }); }); }); DOM.btnSend.addEventListener('click', handleSend); DOM.input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); }); DOM.btnAttach.addEventListener('click', () => DOM.fileInput.click()); DOM.fileInput.addEventListener('change', handleFileUpload); DOM.btnRemoveAttach.addEventListener('click', () => { state.attachmentSnippet = null; DOM.fileInput.value = ''; DOM.attachPreview.classList.remove('active'); }); DOM.btnClearHistory.addEventListener('click', () => { state.history = []; localStorage.removeItem('krab_chat_history'); DOM.messages.innerHTML = ''; }); }
    async function handleFileUpload(e) { const file = e.target.files[0]; if (!file) return; const formData = new FormData(); formData.append('file', file); DOM.attachPreview.querySelector('span').textContent = 'Загрузка...'; DOM.attachPreview.classList.add('active'); try { const res = await fetch('/api/assistant/attachment', { method: 'POST', headers: { 'Authorization': `Bearer ${state.token}` }, body: formData }); if (!res.ok) throw new Error('Upload failed'); const data = await res.json(); state.attachmentSnippet = data.snippet || `[Attached File: ${file.name}]`; DOM.attachPreview.querySelector('span').textContent = `${file.name}`; } catch (err) { console.error(err); DOM.attachPreview.querySelector('span').textContent = 'Ошибка загрузки'; setTimeout(() => DOM.attachPreview.classList.remove('active'), 3000); } }
    function handleSend() { let text = DOM.input.value.trim(); if (!text && !state.attachmentSnippet) return; if (state.attachmentSnippet) { text = state.attachmentSnippet + '\n\n' + text; state.attachmentSnippet = null; DOM.attachPreview.classList.remove('active'); DOM.fileInput.value = ''; } renderMessage('user', text); DOM.input.value = ''; startStream(text); }
    function startStream(promptText) { if (state.currentEventSource) { state.currentEventSource.close(); } showTypingIndicator(); const url = new URL(window.location.origin + '/api/assistant/stream'); url.searchParams.append('prompt', promptText); url.searchParams.append('token', state.token); const es = new EventSource(url.toString()); state.currentEventSource = es; let currentAssistantBubble = null; let currentAssistantText = ''; let activeToolPill = null; es.addEventListener('status', (e) => { console.log('Status:', e.data); }); es.addEventListener('tool_start', (e) => { hideTypingIndicator(); try { const data = JSON.parse(e.data); activeToolPill = renderToolPill(data.name, data.args, null, 'running'); } catch(err) { console.error(err); } }); es.addEventListener('tool_done', (e) => { if (activeToolPill) { try { const data = JSON.parse(e.data); updateToolPill(activeToolPill, data.result, 'ok'); activeToolPill = null; } catch(err) { console.error(err); } } showTypingIndicator(); }); es.addEventListener('message', (e) => { hideTypingIndicator(); let chunk; try { const parsed = JSON.parse(e.data); chunk = parsed.reply ?? parsed.text ?? e.data; } catch { chunk = e.data; } currentAssistantText += chunk; if (!currentAssistantBubble) { currentAssistantBubble = renderMessage('assistant', currentAssistantText, false); } else { currentAssistantBubble.innerHTML = parseMarkdown(currentAssistantText); scrollToBottom(); } }); es.addEventListener('route', (e) => { console.log('Route changed to:', e.data); }); es.addEventListener('error', (e) => { hideTypingIndicator(); console.error('SSE Error:', e); renderToolPill('System', null, 'Connection error or stream interrupted.', 'error'); es.close(); }); es.addEventListener('done', (e) => { hideTypingIndicator(); if (currentAssistantText) { state.history.push({ type: 'message', role: 'assistant', content: currentAssistantText }); saveHistory(); } es.close(); state.currentEventSource = null; }); }
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

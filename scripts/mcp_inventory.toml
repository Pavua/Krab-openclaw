# MCP Inventory — реестр доступных MCP-серверов для регистрации в OpenClaw.
# Каждая [<name>] секция = один сервер. Поля:
#   description    — короткое назначение (одна строка)
#   transport      — streamable-http | sse | stdio  ("http" — алиас, маппится в streamable-http)
#   url            — для http/sse (опц. для stdio)
#   command/args   — для stdio (опц. для http/sse)
#   headers        — dict с шаблонами `${ENV_VAR}` (опционально)
#   required_env   — список env-vars; если хоть один пуст, сервер skip-ается в --add-all-with-tokens
#   notes          — произвольный комментарий
#
# Helper: scripts/openclaw_mcp_register.py.

[context7]
description = "Live API docs lookup для библиотек/SDK (Upstash)"
transport = "stdio"
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
required_env = []
notes = "Работает без токена (rate-limited). CONTEXT7_API_KEY поддерживается через env-pass."

[github]
description = "GitHub Issues / PRs / Repos / Actions через Copilot MCP"
transport = "streamable-http"
url = "https://api.githubcopilot.com/mcp/"
required_env = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
[github.headers]
Authorization = "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"

[firecrawl]
description = "Web scraping / crawl / map (Firecrawl)"
transport = "stdio"
command = "npx"
args = ["-y", "firecrawl-mcp"]
required_env = ["FIRECRAWL_API_KEY"]
[firecrawl.env]
FIRECRAWL_API_KEY = "${FIRECRAWL_API_KEY}"

[sentry]
description = "Sentry issues + analytics (mcp.sentry.dev, OAuth flow)"
transport = "streamable-http"
url = "https://mcp.sentry.dev/mcp"
required_env = ["SENTRY_AUTH_TOKEN"]
[sentry.headers]
Authorization = "Bearer ${SENTRY_AUTH_TOKEN}"

[linear]
description = "Linear issues / projects / cycles"
transport = "streamable-http"
url = "https://mcp.linear.app/mcp"
required_env = ["LINEAR_API_KEY"]
[linear.headers]
Authorization = "Bearer ${LINEAR_API_KEY}"

[supabase]
description = "Supabase DB / edge functions / migrations"
transport = "streamable-http"
url = "https://mcp.supabase.com/mcp"
required_env = ["SUPABASE_ACCESS_TOKEN"]
[supabase.headers]
Authorization = "Bearer ${SUPABASE_ACCESS_TOKEN}"

[notion]
description = "Notion pages / databases (OAuth)"
transport = "streamable-http"
url = "https://mcp.notion.com/mcp"
required_env = ["NOTION_API_KEY"]
[notion.headers]
Authorization = "Bearer ${NOTION_API_KEY}"

[slack]
description = "Slack channels / DM / search (OAuth)"
transport = "streamable-http"
url = "https://mcp.slack.com/mcp"
required_env = ["SLACK_BOT_TOKEN"]
[slack.headers]
Authorization = "Bearer ${SLACK_BOT_TOKEN}"

[atlassian]
description = "Jira / Confluence (Atlassian Cloud)"
transport = "streamable-http"
url = "https://mcp.atlassian.com/v1/mcp"
required_env = ["ATLASSIAN_API_TOKEN"]
[atlassian.headers]
Authorization = "Bearer ${ATLASSIAN_API_TOKEN}"

[asana]
description = "Asana tasks / projects (SSE)"
transport = "sse"
url = "https://mcp.asana.com/sse"
required_env = ["ASANA_ACCESS_TOKEN"]
[asana.headers]
Authorization = "Bearer ${ASANA_ACCESS_TOKEN}"

[figma]
description = "Figma design files / variables / Code Connect"
transport = "streamable-http"
url = "https://mcp.figma.com/mcp"
required_env = ["FIGMA_ACCESS_TOKEN"]
[figma.headers]
Authorization = "Bearer ${FIGMA_ACCESS_TOKEN}"

[gitlab]
description = "GitLab issues / pipelines"
transport = "streamable-http"
url = "https://gitlab.com/api/v4/mcp"
required_env = ["GITLAB_PERSONAL_ACCESS_TOKEN"]
[gitlab.headers]
Authorization = "Bearer ${GITLAB_PERSONAL_ACCESS_TOKEN}"

[stripe]
description = "Stripe payments / subscriptions (PRODUCTION — осторожно!)"
transport = "streamable-http"
url = "https://mcp.stripe.com"
required_env = ["STRIPE_API_KEY"]
[stripe.headers]
Authorization = "Bearer ${STRIPE_API_KEY}"
notes = "PRODUCTION: использовать только read-only / staging keys."

[firebase]
description = "Firebase admin (npx firebase-tools mcp; gcloud auth требуется)"
transport = "stdio"
command = "npx"
args = ["-y", "firebase-tools@latest", "mcp"]
required_env = []
notes = "Auth через gcloud login, не env."

[planetscale]
description = "PlanetScale DB branches / queries"
transport = "streamable-http"
url = "https://mcp.pscale.dev/mcp/planetscale"
required_env = ["PLANETSCALE_SERVICE_TOKEN"]
[planetscale.headers]
Authorization = "Bearer ${PLANETSCALE_SERVICE_TOKEN}"

[huggingface]
description = "Hugging Face models / datasets / Spaces"
transport = "streamable-http"
url = "https://huggingface.co/mcp"
required_env = ["HF_TOKEN"]
[huggingface.headers]
Authorization = "Bearer ${HF_TOKEN}"

[cloudflare]
description = "Cloudflare Workers / D1 / KV / R2 / Hyperdrive"
transport = "sse"
url = "https://mcp.cloudflare.com/sse"
required_env = ["CLOUDFLARE_API_TOKEN"]
[cloudflare.headers]
Authorization = "Bearer ${CLOUDFLARE_API_TOKEN}"

